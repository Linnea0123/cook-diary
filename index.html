<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🍳 料理计划 · 双色系+Gist同步</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #e8f0fe;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .app {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* 妈妈蓝色系主题 */
        .app.mom-theme {
            --primary: #1e5f8e;
            --primary-light: #e3f0ff;
            --primary-bg: #f0f7ff;
            --border: #d9e6f5;
        }
        /* 宝宝粉色系主题 */
        .app.baby-theme {
            --primary: #d47f9f;
            --primary-light: #ffe4ec;
            --primary-bg: #fff5f8;
            --border: #ffe0e8;
        }

        /* 头部 */
        .header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--primary-bg);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary);
        }

        .user-badge {
            font-size: 12px;
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: 30px;
            color: var(--primary);
            font-weight: 500;
        }

        .switch-user-btn {
            background: var(--primary-light);
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 顶部导航栏 */
        .top-nav {
            flex-shrink: 0;
            background: white;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 4px 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            color: #7f8c8d;
        }

        .nav-item.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .main-content {
            flex: 1;
            background: white;
            overflow-y: auto;
            min-height:  -2px; 
        }

        /* 计划页布局 */
        .main-layout {
            display: flex;
            height: 100%;
            overflow: hidden;
        }

        /* 左侧栏 - flex列布局 */
        .date-sidebar {
            width: 88px;
            background: #f8fbfe;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .baby-theme .date-sidebar { background: #fffafc; }

        /* 日期列表区域 - 可滚动，占据剩余空间 */
        .date-items {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .timeRangeBtn {
    background: var(--primary-light);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
}


        .date-item {
            padding: 14px 6px;
            text-align: center;
            font-size: 13px;
            color: #4a627a;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            line-height: 1.4;
        }
        .baby-theme .date-item { color: #a06b82; }
        .date-item.active {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
            border-left: 3px solid var(--primary);
        }

        .date-week { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
        .date-day { font-size: 11px; color: #7f8c8d; }
        .baby-theme .date-day { color: #b88aa0; }
        .date-tag { font-size: 9px; background: var(--primary-light); display: inline-block; padding: 2px 6px; border-radius: 12px; margin-top: 4px; color: var(--primary); }

   

/* 左侧栏 - flex列布局 */
.date-sidebar {
    width: 88px;
    background: #f8fbfe;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow-y: auto;  /* 改为 auto，允许滚动但隐藏滚动条 */
    scrollbar-width: none;  /* 隐藏滚动条 Firefox */
    -ms-overflow-style: none;  /* 隐藏滚动条 IE/Edge */
}
.date-sidebar::-webkit-scrollbar {
    display: none;  /* 隐藏滚动条 Chrome/Safari */
}
.baby-theme .date-sidebar { background: #fffafc; }

/* 日期列表区域 - 可滚动，但无滚动条 */
.date-items {
    flex: 0 0 auto;  /* 改为不自动扩展，让内容决定高度 */
    overflow-y: visible;
    padding-bottom: 4px;
}

/* 箭头区域 - 紧贴在星期日下方，紧凑 */
.week-nav-container {
    padding: 4px 0 0px 0;
    display: flex;
    justify-content: center;
    gap: 0;
    background: #f8fbfe;
    flex-shrink: 0;
    margin-top: 0;
}
.baby-theme .week-nav-container { background: #fffafc; }

.week-arrow {
    font-size: 18px;
    cursor: pointer;
    padding: 2px 12px;
    margin: 0 -4px;  /* 使用负margin让箭头重叠紧贴 */
    background: transparent;
    color: var(--primary);
    transition: all 0.1s;
}
.week-arrow:active { 
    opacity: 0.6; 
    transform: scale(0.92);
}

/* 设置按钮区域 - 紧贴箭头下方 */
.sidebar-settings {
    padding: 0px 0 4px 0;
    display: flex;
    justify-content: center;
    flex-shrink: 0;
    background: inherit;
    margin-top: -2px;;
}
.sidebar-settings-btn {
    background: transparent;
    border: none;
    font-size: 18px;
    cursor: pointer;
    padding: 2px 10px;
    border-radius: 30px;
    color: var(--primary);
    transition: all 0.1s;
}
.sidebar-settings-btn:active {
    background: var(--primary-light);
    transform: scale(0.92);
}
        
        /* 右侧计划内容 */
        .plan-content {
            padding: 0px 12px 20px 12px;  /* 上边距改为0 */
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

/* 日期标题栏 - 强制向上移动 */
.selected-date-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 8px;
    margin-top: -8px;  /* 负边距，向上移动8像素 */
    padding-top: 0;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    line-height: 1.2;
}

        .add-meal-btn {
            background: transparent; 
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 28px;
            font-size: 18px;
            cursor: pointer;
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .add-meal-btn:active { transform: scale(0.92); }

        .meal-section {
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }


.meal-header {
    background: var(--primary-bg);
    padding: 6px 10px;  /* 从6px 10px改为4px 10px，减少上下内边距 */
    font-size: 13px;  /* 保持原字体大小 */
    font-weight: 600;
    color: var(--primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1.3;  /* 控制行高 */
}

        .meal-header .arrow { transition: transform 0.2s; font-size: 11px; }
        .meal-header.collapsed .arrow { transform: rotate(-90deg); }
        .meal-content {  padding: 12px 8px 0px 12px;   /* 原值 12px 14px → 改小 */ }
        .meal-content.collapsed { display: none; }

       /* 分类行 - 缩小间距 */
.category-row {
    margin-bottom: 4px;  /* 从8px改为4px */
    display: flex;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 4px;  /* 从6px改为4px */
}
    /* 分类标题 - 调整大小 */
.category-title {
    font-size: 11px;  /* 与菜谱标签一致 */
    font-weight: 600;
    min-width: 36px;
    padding: 3px 8px;  /* 调整内边距使其与菜谱标签视觉一致 */
    border-radius: 16px;
    text-align: center;
    flex-shrink: 0;
}
        .category-title[data-cat="主食"] { background: #fff3e0; color: #c97e0a; }
        .category-title[data-cat="蔬菜"] { background: #e8f5e9; color: #2e7d32; }
        .category-title[data-cat="肉鱼"] { background: #ffebee; color: #c62828; }
        .category-title[data-cat="蛋"] { background: #fff9c4; color: #b26a00; }
        .category-title[data-cat="油脂"] { background: #f3e5f5; color: #7b1fa2; }
        .category-title[data-cat="水果"] { background: #e1f5fe; color: #0288d1; }

        .recipe-tags { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; }
        .recipe-tag {
    background: #f5f5f5;
    border-radius: 16px;
    padding: 3px 8px;  /* 与分类标题保持一致 */
    font-size: 11px;  /* 统一字体大小 */
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 3px;
}
        
.count-badge { 
    color: #e06b6b;       /* 红色文字，背景透明 */
    background: transparent;  /* 去掉红色背景 */
    font-size: 11px;      /* 文字大小 */
    font-weight: 600;     /* 加粗更明显 */
    display: inline-flex; 
    align-items: center; 
    justify-content: center; 
    /* 去掉 min-width、height、border-radius、padding */
}



        .add-btn-slim { font-size: 18px; cursor: pointer; color: #7f8c8d; background: none; border: none; width: 28px; height: 28px; }
        .delete-meal { margin-left: auto; font-size: 13px; cursor: pointer; color: #7f8c8d; background: none; border: none; padding: 4px 10px; }

        /* 菜谱库页 */
        .recipe-page, .search-page { padding: 16px; height: 100%; overflow-y: auto; }
        .recipe-header { display: flex; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .recipe-header h2 { font-size: 18px; font-weight: 600; color: var(--primary); }
        .search-box { background: #f5f7fa; border: 1px solid var(--border); border-radius: 30px; padding: 8px 16px; width: 160px; font-size: 14px; }
        
.category-filter { 
    display: flex; 
    gap: 8px; 
    margin-bottom: 18px; 
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;  /* 隐藏滚动条 Firefox */
    -ms-overflow-style: none; /* 隐藏滚动条 IE/Edge */
}

.category-filter::-webkit-scrollbar {
    display: none;  /* 隐藏滚动条 Chrome/Safari */
}

   .filter-tag { 
    padding: 5px 12px;
    background: #f5f7fa; 
    border-radius: 30px; 
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
}
.filter-tag.active { background: var(--primary-light); color: var(--primary); }

/* 为不同的主分类添加颜色 */
.filter-tag[data-category="主食"] { background: #fff3e0; color: #c97e0a; }
.filter-tag[data-category="蔬菜"] { background: #e8f5e9; color: #2e7d32; }
.filter-tag[data-category="肉鱼"] { background: #ffebee; color: #c62828; }
.filter-tag[data-category="蛋"] { background: #fff9c4; color: #b26a00; }
.filter-tag[data-category="油脂"] { background: #f3e5f5; color: #7b1fa2; }
.filter-tag[data-category="水果"] { background: #e1f5fe; color: #0288d1; }

        .filter-tag.active { background: var(--primary-light); color: var(--primary); }
       
       /* 子分类栏样式 */
.subcategory-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    overflow-x: auto;
    flex-wrap: nowrap;
    scrollbar-width: none;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
}
.subcategory-bar::-webkit-scrollbar { display: none; }
.sub-filter-tag {
    padding: 4px 12px;
    background: #f0f2f5;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    color: #5a6874;
}
.sub-filter-tag.active {
    background: var(--primary-light);
    color: var(--primary);
    font-weight: 500;
}
.sub-badge {
    font-size: 10px;
    background: #e9ecef;
    border-radius: 20px;
    padding: 2px 8px;
    color: #5a626e;
    margin-left: 6px;
}
       
        .library-text-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .recipe-text-card { 
    background: #f5f7fa; 
    border: 1px solid var(--border); 
    border-radius: 30px; 
    padding: 5px 14px; 
    font-size: 13px; 
    cursor: pointer; 
    display: inline-flex; 
    align-items: center; 
    gap: 4px;
    transition: all 0.1s ease;
}
        .small-count { background: transparent; color: #e06b6b; font-size: 10px; font-weight: 500; margin-left: 4px; }

        /* 搜索页 */
        .search-input { width: 100%; padding: 12px 18px; border: 1px solid var(--border); border-radius: 40px; font-size: 15px; margin-bottom: 20px; background: #f5f7fa; }
        .recent-title { font-size: 13px; color: #7f8c8d; margin-bottom: 10px; }
        .recent-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
        .recent-tag { padding: 6px 16px; background: #f5f7fa; border-radius: 30px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); }

        /* 弹窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-content { 
    background: white; 
    width: 90%; 
    max-width: 360px; 
    border-radius: 24px; 
    padding: 22px; 
    max-height: 90vh; 
    overflow-y: visible;
}
        .modal-title { font-size: 18px; font-weight: 600; color: var(--primary); margin-bottom: 20px; text-align: center; }
        .setting-group { margin-bottom: 16px; }
        .setting-label { font-size: 13px; color: #666; margin-bottom: 6px; display: block; }
        .setting-input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; }
        .sync-buttons { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .sync-btn { flex: 1; padding: 10px; border-radius: 30px; font-size: 14px; cursor: pointer; border: none; font-weight: 500; background: var(--primary-light); color: var(--primary); }
        .sync-btn.danger { background: #ffebee; color: #c62828; }
        .sync-status { font-size: 12px; color: #7f8c8d; text-align: center; margin-top: 12px; padding: 8px; background: #f5f7fa; border-radius: 12px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 16px; }
        .modal-btn { flex: 1; padding: 10px; border-radius: 40px; font-size: 14px; cursor: pointer; border: none; font-weight: 500; }
       

.modal-btn-primary,
.modal-btn-danger,
.modal-btn-secondary {
    background: #f0f0f0;
    color: #333;
    border: none;
    padding: 10px;
    border-radius: 40px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
    flex: 1;
    text-align: center;
}


        .history-list { max-height: 130px; overflow-y: auto; background: #f8fbfe; padding: 10px; border-radius: 14px; font-size: 13px; margin: 12px 0; }
        .history-item { padding: 5px 0; border-bottom: 1px dashed var(--border); }
        .modal-image { width: 100%; aspect-ratio: 1 / 1; background: #f5f7fa; border-radius: 16px; margin: 12px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        </style>
</head>
<body>
<div class="app mom-theme" id="app">
    <div class="header">
        <div class="header-left">
            <h1>🍳 料理日记</h1>
           
        </div>
        <button class="switch-user-btn" id="switchUserBtn">👩 妈妈</button>
    </div>

    <div class="top-nav">
    <div class="nav-item active" data-page="plan"><span>📅</span><span>计划</span></div>
    <div class="nav-item" data-page="recipe"><span>📖</span><span>菜谱</span></div>
</div>
    

    <div class="main-content" id="mainContent"></div>
</div>

<!-- 设置弹窗 -->
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <div class="modal-title">⚙️ 同步设置</div>
        <div class="setting-group"><label class="setting-label">GitHub Token</label><input type="password" class="setting-input" id="githubToken" placeholder="ghp_xxxxxxxxxxxx"></div>
        <div class="setting-group"><label class="setting-label">Gist ID</label><input type="text" class="setting-input" id="gistId" placeholder="输入 Gist ID"></div>
        <div class="sync-buttons"><button class="sync-btn" id="saveSettingsBtn">💾 保存设置</button><button class="sync-btn" id="syncToGistBtn">☁️ 立即同步</button><button class="sync-btn danger" id="restoreFromGistBtn">📥 恢复云端</button></div>
        <div class="sync-status" id="syncStatus">未同步</div>
        <div class="modal-buttons"><button class="modal-btn modal-btn-secondary" id="closeSettingsBtn">关闭</button></div>
    </div>
</div>

<!-- 添加餐次弹窗 -->
<div class="modal" id="addMealModal">
    <div class="modal-content">
        <div class="modal-title">➕ 添加餐次</div>
        <div class="setting-group"><label class="setting-label">餐次名称</label><input type="text" class="setting-input" id="newMealName" placeholder="例如：早茶、加餐、夜宵"></div>
        <div class="modal-buttons"><button class="modal-btn modal-btn-primary" id="confirmAddMealBtn">添加</button><button class="modal-btn modal-btn-secondary" id="cancelAddMealBtn">取消</button></div>
    </div>
</div>

<!-- 预览弹窗 -->
<!-- 预览弹窗 -->
<div class="modal" id="previewModal">
    <div class="modal-content">
        <div id="previewName" style="font-size:20px;font-weight:600;text-align:center; display: flex; align-items: center; justify-content: center; gap: 8px;"></div>
      <div class="modal-image" id="previewImageContainer"></div>
<div id="previewQuantity" style="text-align: center; font-size: 14px; color: #e06b6b; margin: 8px 0 4px 0; font-weight: 500;"></div>
<div class="history-list" id="previewHistory"></div>

        <div class="modal-buttons" style="display: flex; gap: 8px;">
    <button class="modal-btn modal-btn-primary" id="previewEditBtn" style="flex:1;">编辑</button>
    <button class="modal-btn modal-btn-danger" id="previewRemoveFromPlanBtn" style="flex:1; background:#ffebee; color:#c62828; border:none; border-radius:40px; padding:10px; cursor:pointer;">从计划删除</button>
    <button class="modal-btn modal-btn-secondary" id="previewCloseBtn" style="flex:1;">关闭</button>
</div>
    </div>
</div>

<!-- 编辑弹窗 -->
<!-- 编辑弹窗 -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <h3 style="margin-bottom:16px; color: var(--primary);">编辑菜谱</h3>
        <input type="hidden" id="editId">
        
        <!-- 图片预览和上传区域 -->
        <div style="margin-bottom: 16px;">
            <div id="editImagePreview" style="width: 100%; aspect-ratio: 1 / 1; background: #f5f7fa; border-radius: 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 12px; border: 1px solid var(--border);">
                <span style="color: #999;">📷 暂无图片</span>
            </div>
            <input type="file" id="editImageUpload" accept="image/*" style="width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 12px; font-size: 13px;">
        </div>
        
        <input type="text" id="editName" placeholder="菜名" style="width:100%; padding:10px; margin-bottom:12px; border-radius:12px; border:1px solid #ddd; font-size: 14px;">
        
        
        <!-- 主分类选择 -->
<select id="editMainCategory" style="width:100%; padding:10px; margin-bottom:12px; border-radius:12px; border:1px solid #ddd; font-size: 14px;">
    <option value="主食">主食</option>
    <option value="蔬菜">蔬菜</option>
    <option value="肉鱼">肉鱼</option>
    <option value="蛋">蛋</option>
    <option value="油脂">油脂</option>
    <option value="水果">水果</option>
</select>

<!-- 子分类选择 -->
<select id="editSubCategory" style="width:100%; padding:10px; margin-bottom:12px; border-radius:12px; border:1px solid #ddd; font-size: 14px;">
    <option value="">无子分类</option>
</select>

};



    function getWeekDates() {
        const today = new Date();
        const start = new Date(today);
        start.setDate(today.getDate() - today.getDay() + 1);
        let dates = [];
        const weekNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
        for (let i = 0; i < 7; i++) {
            const d = new Date(start);
            d.setDate(start.getDate() + i);
            const m = d.getMonth() + 1, day = d.getDate();
            dates.push({ dateStr: `${m.toString().padStart(2,'0')}/${day.toString().padStart(2,'0')}`, week: weekNames[i], fullDate: d, isToday: d.toDateString() === today.toDateString() });
        }
        return dates;
    }
    let weekDates = getWeekDates();
    let currentTimeRange = 'month'; // 'month', 'quarter', 'year', 'all'
    function initEmptyPlan() { 
    let empty = {}; 
    weekDates.forEach(d => { 
        empty[d.dateStr] = {}; 
        defaultMeals.forEach(m => { 
            let mealObj = {};
            customCategories.forEach(cat => {
                mealObj[cat] = [];
            });
            empty[d.dateStr][m] = mealObj;
        }); 
    }); 
    return empty; 
}


// 保存子分类

}

// 加载类别
function loadCategories() {
    const saved = localStorage.getItem('custom_categories');
    if (saved) {
        try {
            customCategories = JSON.parse(saved);
        } catch(e) {}
    }
    // 确保默认分类存在
    const defaultCats = ['主食', '蔬菜', '肉鱼', '蛋', '油脂', '水果'];
    for (let cat of defaultCats) {
        if (!customCategories.includes(cat)) {
            customCategories.push(cat);
        }
    }
}

    function loadData() {
        loadCategories(); // 添加这一行
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            const data = JSON.parse(saved);
            // 兼容旧数据格式
            if (data.recipes && !data.recipes.mom) {
                // 旧格式：recipes 是数组，需要转换
                const oldRecipes = data.recipes;
                recipes = {
                    mom: [...oldRecipes],
                    baby: [...oldRecipes]
                };
            } else {
                recipes = data.recipes || { mom: [...defaultRecipes], baby: [...defaultRecipes] };
            }
            userData = data.userData || { mom: { planData: initEmptyPlan(), history: {}, mealOrder: {} }, baby: { planData: initEmptyPlan(), history: {}, mealOrder: {} } };
        } catch(e) {
            recipes = { mom: [...defaultRecipes], baby: [...defaultRecipes] };
            userData = { mom: { planData: initEmptyPlan(), history: {}, mealOrder: {} }, baby: { planData: initEmptyPlan(), history: {}, mealOrder: {} } };
        }
    } else {
        recipes = { mom: [...defaultRecipes], baby: [...defaultRecipes] };
        userData = { mom: { planData: initEmptyPlan(), history: {}, mealOrder: {} }, baby: { planData: initEmptyPlan(), history: {}, mealOrder: {} } };
    }
    
    // 确保每个用户的 recipes 都存在
    if (!recipes.mom) recipes.mom = [...defaultRecipes];
    if (!recipes.baby) recipes.baby = [...defaultRecipes];
    
    ['mom','baby'].forEach(u => {
        if (!userData[u].planData) userData[u].planData = initEmptyPlan();
        if (!userData[u].history) userData[u].history = {};
        if (!userData[u].mealOrder) userData[u].mealOrder = {};
        // 为每个用户的菜谱初始化历史记录
        (recipes[u] || []).forEach(r => { 
            if (!userData[u].history[r.id]) userData[u].history[r.id] = [];

});
    });
// 在 loadData() 函数的最后，saveData() 之前添加
['mom', 'baby'].forEach(u => {

}




    function currentRecipes() {
    return recipes[currentUser] || [];
}




function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ recipes, userData })); }
    
    function currentPlan() { return userData[currentUser].planData; }
    function currentMealOrder() { return userData[currentUser].mealOrder; }
    
    function currentHistory(rid, timeRange = null) {
    const range = timeRange || currentTimeRange;
    const allHistory = userData[currentUser].history[rid] || [];
    if (range === 'all') return allHistory;
    
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth(); // 0-11
    
    return allHistory.filter(record => {
        // 记录格式如 "03/23早餐" 或 "03/23午餐"
        const datePart = record.substring(0, 5); // 取 "03/23"
        const [month, day] = datePart.split('/');
        const recordDate = new Date(currentYear, parseInt(month) - 1, parseInt(day));
        
        if (range === 'month') {
            // 同一个月
            return recordDate.getMonth() === currentMonth && recordDate.getFullYear() === currentYear;
        } else if (range === 'quarter') {
            // 本季度
            const currentQuarter = Math.floor(currentMonth / 3);
            const recordQuarter = Math.floor(recordDate.getMonth() / 3);
            return recordQuarter === currentQuarter && recordDate.getFullYear() === currentYear;
        } else if (range === 'year') {
            // 本年
            return recordDate.getFullYear() === currentYear;
        }
        return true;
    });
}
  
    function addHistory(rid, record) { 
        if (!userData[currentUser].history[rid]) userData[currentUser].history[rid] = [];
        userData[currentUser].history[rid].unshift(record);
        if (userData[currentUser].history[rid].length > 15) userData[currentUser].history[rid].pop();
        saveData();
    }
    
    let selectedDate = weekDates.find(d => d.isToday)?.dateStr || weekDates[0].dateStr;
    let selectedMeal = '', selectedCategory = '';
    let currentPreview = null;
let currentPreviewSource = null; // 添加这一行
    let currentMainFilter = 'all';
let currentSubFilter = '';
    function getMealsForDate(dateStr) {
        const order = currentMealOrder()[dateStr];
        if (order && order.length) return order;
        return [...defaultMeals];
    }
    
    function renderPlanContent() {
        const plan = currentPlan()[selectedDate] || {};
        const meals = getMealsForDate(selectedDate);
        let html = `<div class="selected-date-title"><span>📅 ${selectedDate}</span><div><button class="add-meal-btn" id="addMealBtn">+</button><span style="margin-left:8px;"></span></div></div>`;
        const categories = customCategories;
        for (let meal of meals) {
            let defaultMealObj = {};
customCategories.forEach(cat => {
    defaultMealObj[cat] = [];
});
const mealData = plan[meal] || defaultMealObj;
            let inner = '';
            categories.forEach(cat => {
                const list = mealData[cat] || [];
                const tagsHtml = list.length ? list.map(name => {
                    const recipe = currentRecipes().find(r => r.name === name);
                    const count = recipe ? currentHistory(recipe.id).length : 0;
                    return `<span class="recipe-tag" data-name="${name}">${name}${count ? `<span class="count-badge">${count}</span>` : ''}</span>`;
                }).join('') : '<span style="font-size:12px;color:#aaa;"></span>';
                inner += `<div class="category-row"><span class="category-title" data-cat="${cat}">${cat}</span><div class="recipe-tags">${tagsHtml}</div><button class="add-btn-slim" data-meal="${meal}" data-category="${cat}">+</button></div>`;
            });
            html += `<div class="meal-section"><div class="meal-header"><span class="arrow">▼</span> ${meal}<button class="delete-meal" data-meal="${meal}">✕</button></div><div class="meal-content">${inner}</div></div>`;
        }
        return html;
    }
    
   function renderPlanPage() {
    const dateItems = weekDates.map((d, index) => `
        <div class="date-item ${d.dateStr === selectedDate ? 'active' : ''}" data-date="${d.dateStr}">
            <div class="date-week">${d.week}</div>
            <div class="date-day">${d.dateStr}</div>
            ${d.isToday ? '<div class="date-tag">今</div>' : ''}
        </div>
        ${index === weekDates.length - 1 ? `
        <div class="week-nav-container">
            <span class="week-arrow prev">◀</span>
            <span class="week-arrow next">▶</span>
        </div>
        ` : ''}
    `).join('');
    
    return `
        <div class="main-layout">
            <div class="date-sidebar">
                <div class="date-items">
                    ${dateItems}
                </div>
                <div class="sidebar-settings">
                    <button class="sidebar-settings-btn" id="sidebarSettingsBtn">⚙️</button>
                </div>
            </div>
            <div class="plan-content" id="planContent">
                ${renderPlanContent()}
            </div>
        </div>
    `;
}
    
function refreshPlan() {
    const pc = document.getElementById('planContent');
    if (pc) { 
        pc.innerHTML = renderPlanContent(); 
        attachPlanEvents();  // 只绑定计划内容的事件
    }
    // 移除 attachDateNav() 调用，避免重复绑定日期事件
    
    // 刷新后重新高亮当前选中的日期
    const activeDateItem = document.querySelector(`.date-item[data-date="${selectedDate}"]`);
    if (activeDateItem) {
        document.querySelectorAll('.date-item').forEach(item => {
            item.classList.remove('active');
        });
        activeDateItem.classList.add('active');
    }
    
    // 添加餐次按钮事件（只绑定一次）
    const addMealBtn = document.getElementById('addMealBtn');
    if (addMealBtn && !addMealBtn._hasListener) {
        addMealBtn.addEventListener('click', showAddMealModal);
        addMealBtn._hasListener = true;
    }
}

    function showAddMealModal() {
        document.getElementById('newMealName').value = '';
        document.getElementById('addMealModal').classList.add('active');
    }
    
    function addNewMeal() {
        const newMeal = document.getElementById('newMealName').value.trim();
        if (!newMeal) return;
        const meals = getMealsForDate(selectedDate);
        if (meals.includes(newMeal)) { alert('该餐次已存在'); return; }
        meals.push(newMeal);
        userData[currentUser].mealOrder[selectedDate] = meals;
        if (!currentPlan()[selectedDate][newMeal]) {
           let mealObj = {};
customCategories.forEach(cat => {
    mealObj[cat] = [];
});
currentPlan()[selectedDate][newMeal] = mealObj; 
        }
        saveData();
        document.getElementById('addMealModal').classList.remove('active');
        refreshPlan();
    }
    
function attachPlanEvents() {
    console.log('attachPlanEvents 被调用，recipe-tag 数量:', document.querySelectorAll('.recipe-tag').length);
    document.querySelectorAll('.recipe-tag').forEach(tag => {
        // 移除旧的事件避免重复
        tag.removeEventListener('click', tag._clickHandler);
        tag._clickHandler = () => {
            console.log('点击了菜谱:', tag.dataset.name);
            const recipe = currentRecipes().find(r => r.name === tag.dataset.name);
            console.log('找到的菜谱:', recipe);
            if(recipe) showPreview(recipe, 'plan');
        };
        tag.addEventListener('click', tag._clickHandler);
    });
    document.querySelectorAll('.add-btn-slim').forEach(btn => {
        btn.removeEventListener('click', btn._clickHandler);
        btn._clickHandler = (e) => { e.stopPropagation(); selectedMeal = btn.dataset.meal; selectedCategory = btn.dataset.category; showSelectModal(selectedCategory); };
        btn.addEventListener('click', btn._clickHandler);
    });
    document.querySelectorAll('.meal-header').forEach(header => {
        header.removeEventListener('click', header._clickHandler);
        header._clickHandler = (e) => { if(e.target.classList.contains('delete-meal')) return; header.classList.toggle('collapsed'); header.nextElementSibling.classList.toggle('collapsed'); };
        header.addEventListener('click', header._clickHandler);
    });
    document.querySelectorAll('.delete-meal').forEach(btn => {
        btn.removeEventListener('click', btn._clickHandler);
        btn._clickHandler = (e) => { e.stopPropagation(); const meal = btn.dataset.meal; const meals = getMealsForDate(selectedDate); const idx = meals.indexOf(meal); if(idx !== -1) { meals.splice(idx,1); userData[currentUser].mealOrder[selectedDate] = meals; delete currentPlan()[selectedDate][meal]; saveData(); refreshPlan(); } };
        btn.addEventListener('click', btn._clickHandler);
    });
} 
function shiftWeek(days) {
    weekDates.forEach(d => { 
        d.fullDate.setDate(d.fullDate.getDate() + days); 
        const m = d.fullDate.getMonth()+1, day = d.fullDate.getDate(); 
        d.dateStr = `${m.toString().padStart(2,'0')}/${day.toString().padStart(2,'0')}`; 
        d.isToday = d.fullDate.toDateString() === new Date().toDateString(); 
    });
    selectedDate = weekDates.find(d => d.isToday)?.dateStr || weekDates[0].dateStr;
    
    // 更新计划数据结构...
    ['mom','baby'].forEach(u => { 
        let np = {}; 
        weekDates.forEach(w => { 
            np[w.dateStr] = userData[u].planData[w.dateStr] || {}; 
            if(Object.keys(np[w.dateStr]).length === 0) { 
                np[w.dateStr] = {}; 
                defaultMeals.forEach(m => { 
                   let mealObj = {};
customCategories.forEach(cat => {
    mealObj[cat] = [];
});
np[w.dateStr][m] = mealObj;
                }); 
            } 
        }); 
        userData[u].planData = np; 
    });
    saveData();
    
    const mainContent = document.getElementById('mainContent');
    if (document.querySelector('.nav-item.active').dataset.page === 'plan') { 
        mainContent.innerHTML = renderPlanPage(); 
        // 重置初始化标志，因为 DOM 重新创建了
        dateNavInitialized = false;
        refreshPlan(); 
        attachDateNav(); 
    }
}
    function attachDateNav() {
    // 如果已经初始化过，直接返回，避免重复绑定
    if (dateNavInitialized) return;
    dateNavInitialized = true;
    
    // 绑定日期点击事件
    document.querySelectorAll('.date-item').forEach(el => {
        el.addEventListener('click', () => { 
            selectedDate = el.dataset.date; 
            
            // 手动更新日期高亮
            document.querySelectorAll('.date-item').forEach(item => {
                item.classList.remove('active');
            });
            el.classList.add('active');
            
            refreshPlan(); 
        });
    });
    
    // 绑定周箭头事件
    const weekNav = document.querySelector('.week-nav-container');
    if (weekNav && !weekNav._hasListener) {
        weekNav.addEventListener('click', (e) => {
            const target = e.target.closest('.week-arrow');
            if (!target) return;
            if (target.classList.contains('prev')) shiftWeek(-7);
            else if (target.classList.contains('next')) shiftWeek(7);
        });
        weekNav._hasListener = true;
    }
    
    // 绑定设置按钮事件
    const sidebarBtn = document.getElementById('sidebarSettingsBtn');
    if (sidebarBtn && !sidebarBtn._hasListener) {
        sidebarBtn.addEventListener('click', () => {
            document.getElementById('githubToken').value = localStorage.getItem('github_token') || '';
            document.getElementById('gistId').value = localStorage.getItem('gist_id') || '';
            document.getElementById('settingsModal').classList.add('active');
        });
        sidebarBtn._hasListener = true;
    }
}


   function addToPlan(recipeName) {
    if (!selectedMeal || !selectedCategory) return;
    const plan = currentPlan()[selectedDate];
    
    // 如果该餐次不存在，创建动态分类结构
    if (!plan[selectedMeal]) {
        let mealObj = {};
        customCategories.forEach(cat => {
            mealObj[cat] = [];
        });
        plan[selectedMeal] = mealObj;
    }
    
    // 如果该分类不存在，创建数组
    if (!plan[selectedMeal][selectedCategory]) {
        plan[selectedMeal][selectedCategory] = [];
    }
    
    // 如果菜谱不在计划中，添加
    if (!plan[selectedMeal][selectedCategory].includes(recipeName)) {
        plan[selectedMeal][selectedCategory].push(recipeName);
        const recipe = currentRecipes().find(r => r.name === recipeName);
        if (recipe) addHistory(recipe.id, `${selectedDate}${selectedMeal}`);
        saveData();
        refreshPlan();
    }
}
    function showSelectModal(category) {
    const modal = document.getElementById('selectModal');
    document.getElementById('selectTitle').innerText = `➕ 添加${category}`;
    const filtered = currentRecipes().filter(r => r.mainCat === category);
    document.getElementById('selectTextList').innerHTML = filtered.map(r => `<span class="recipe-tag" style="background:var(--primary-light);padding:6px 16px;" data-name="${r.name}">${r.name}</span>`).join('');
    modal.classList.add('active');
    document.querySelectorAll('#selectTextList .recipe-tag').forEach(el => { 
        el.addEventListener('click', () => { 
            addToPlan(el.dataset.name); 
            modal.classList.remove('active'); 
        }); 
    });
    document.getElementById('closeSelectBtn').onclick = () => modal.classList.remove('active');
}

function getTimeRangeText() {
    switch(currentTimeRange) {

function renderLibrary(cat = 'all', kw = '') { 
    let filtered = currentRecipes().filter(r => 
        (cat === 'all' || r.mainCat === cat) && 
        (currentSubFilter === '' || r.subCat === currentSubFilter) &&
        (kw === '' || r.name.includes(kw))
    ); 
    document.getElementById('libraryGrid').innerHTML = filtered.map(r => {
        const count = currentHistory(r.id).length;
       return `<span class="recipe-text-card" data-id="${r.id}">${r.name}${r.subCat ? `<span class="sub-badge">${r.subCat}</span>` : ''}${count ? `<span class="small-count">${count}</span>` : ''}</span>`;
    }).join(''); 
    document.querySelectorAll('#libraryGrid .recipe-text-card').forEach(c => { 
        c.addEventListener('click', () => { 
            const rec = currentRecipes().find(r=>r.id==parseInt(c.dataset.id)); 
            if(rec) showPreview(rec, 'recipe'); 
        }); 
    }); 
}

            else if (cat === '蔬菜') { bgColor = '#e8f5e9'; textColor = '#2e7d32'; }

            else if (cat === '蛋') { bgColor = '#fff9c4'; textColor = '#b26a00'; }
            else if (cat === '油脂') { bgColor = '#f3e5f5'; textColor = '#7b1fa2'; }

function renderSubcategoryListInModal() {
    const container = document.getElementById('subcategoryListInModal');
    if (!container) return;
    const mainCat = document.getElementById('manageMainCat').value;
    const subs = subCategories[mainCat] || [];
    if (subs.length === 0) {
        container.innerHTML = '<div style="text-align:center; color:#999; padding: 12px 0; font-size: 12px;">暂无子分类，点击上方添加</div>';
        return;
    }
    
    // 根据主分类获取对应的颜色
    let bgColor = '#f0f0f0';
    let textColor = '#555';
    if (mainCat === '主食') { bgColor = '#fff3e0'; textColor = '#c97e0a'; }
    else if (mainCat === '蔬菜') { bgColor = '#e8f5e9'; textColor = '#2e7d32'; }
    else if (mainCat === '肉鱼') { bgColor = '#ffebee'; textColor = '#c62828'; }
    else if (mainCat === '蛋') { bgColor = '#fff9c4'; textColor = '#b26a00'; }
    else if (mainCat === '油脂') { bgColor = '#f3e5f5'; textColor = '#7b1fa2'; }
    else if (mainCat === '水果') { bgColor = '#e1f5fe'; textColor = '#0288d1'; }

    container.innerHTML = subs.map((sub, idx) => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding: 6px 8px; border-bottom: 1px solid #f0f0f0;">
            <span style="font-size: 13px; background: ${bgColor}; color: ${textColor}; padding: 4px 12px; border-radius: 20px; display: inline-block;">${sub}</span>
            <div style="display: flex; gap: 8px;">
                <button class="edit-sub-btn" data-sub="${sub}" style="background: none; border: none; font-size: 13px; cursor: pointer; color: #4a627a;">✏️</button>
                <button class="delete-sub-btn" data-sub="${sub}" style="background: none; border: none; font-size: 13px; cursor: pointer; ">x</button>
            </div>
        </div>
    `).join('');
    
    // 编辑子分类
    container.querySelectorAll('.edit-sub-btn').forEach(btn => {
        btn.onclick = () => {
            const oldSub = btn.dataset.sub;
            const mainCat = document.getElementById('manageMainCat').value;
            const newSub = prompt('请输入新子分类名称', oldSub);
            if (newSub && newSub.trim() && newSub !== oldSub) {
                if (subCategories[mainCat].includes(newSub)) {
                    alert('子分类已存在');
                    return;
                }
                const index = subCategories[mainCat].indexOf(oldSub);
                if (index !== -1) {
                    subCategories[mainCat][index] = newSub;
                    saveSubCategories();
                    renderSubcategoryListInModal();
                    updateSubCategorySelect(mainCat);
                    if (currentMainFilter === mainCat && currentSubFilter === oldSub) {
                        currentSubFilter = newSub;
                    }
                    if (currentMainFilter === mainCat && !currentSubFilter) {
                        const searchValue = document.getElementById('recipeSearch')?.value || '';
                        renderLibrary(mainCat, searchValue);
                        updateSubcategoryBar();
                    }
                }
            }
        };
    });
    
    // 删除子分类
    container.querySelectorAll('.delete-sub-btn').forEach(btn => {
        btn.onclick = () => {
            const subName = btn.dataset.sub;
            const mainCat = document.getElementById('manageMainCat').value;
            if (confirm(`删除子分类「${subName}」？`)) {
                subCategories[mainCat] = subCategories[mainCat].filter(s => s !== subName);
                saveSubCategories();
                renderSubcategoryListInModal();
                updateSubCategorySelect(mainCat);
                if (currentMainFilter === mainCat && currentSubFilter === subName) {
                    currentSubFilter = '';
                    const searchValue = document.getElementById('recipeSearch')?.value || '';
                    renderLibrary(mainCat, searchValue);
                    updateSubcategoryBar();
                } else if (currentMainFilter === mainCat && !currentSubFilter) {
                    const searchValue = document.getElementById('recipeSearch')?.value || '';
                    renderLibrary(mainCat, searchValue);
                    updateSubcategoryBar();
                }
            }
        };
    });
}


function renderCategoryList() {

    if (!container) return;
    
    
    container.innerHTML = customCategories.map(cat => {
    // 获取分类对应的颜色样式
    let bgColor = '#f0f0f0';
    let textColor = '#555';
    if (cat === '主食') { bgColor = '#fff3e0'; textColor = '#c97e0a'; }

    else if (cat === '油脂') { bgColor = '#f3e5f5'; textColor = '#7b1fa2'; }

        </div>
    </div>
`;
}).join('');
    
    // 编辑类别
    document.querySelectorAll('.edit-cat-btn').forEach(btn => {
        btn.onclick = () => {
            const oldName = btn.dataset.cat;
            const newName = prompt('请输入新类别名称', oldName);
            if (newName && newName.trim() && newName !== oldName) {
                if (customCategories.includes(newName)) {
                    alert('类别已存在');
                    return;
                }
                const index = customCategories.indexOf(oldName);
                if (index !== -1) {
                    customCategories[index] = newName;
                    saveCategories();
                    // 更新所有菜谱的类别
                    ['mom', 'baby'].forEach(u => {
                        (recipes[u] || []).forEach(recipe => {
                            if (recipe.mainCat === oldName) {
                                recipe.mainCat = newName;
                            }
                        });
                    });
                    saveData();
                    renderCategoryList();
                    updateSubManageSelect();
                    renderSubcategoryListInModal();
                    // 刷新菜谱库
                    const activePage = document.querySelector('.nav-item.active').dataset.page;
                    if (activePage === 'recipe') {
                        const mainContent = document.getElementById('mainContent');
                        mainContent.innerHTML = renderRecipePage();
                        initRecipe();
                        initCategoryEditor();
                    }
                }
            }
        };
    });
    
    // 删除类别
    document.querySelectorAll('.delete-cat-btn').forEach(btn => {
        btn.onclick = () => {
            const catName = btn.dataset.cat;
            const defaultCats = ['主食', '蔬菜', '肉鱼', '蛋', '油脂', '水果'];
            if (defaultCats.includes(catName)) {
                alert('默认分类不能删除');
                return;
            }
            if (confirm(`确定删除类别「${catName}」吗？\n该类别下的菜谱将移至「其他」类别`)) {
                const index = customCategories.indexOf(catName);
                if (index !== -1) {
                    customCategories.splice(index, 1);
                    saveCategories();
                    // 将属于该类别的菜谱改为「其他」
                    ['mom', 'baby'].forEach(u => {
                        (recipes[u] || []).forEach(recipe => {
                            if (recipe.mainCat === catName) {
                                recipe.mainCat = '其他';
                            }
                        });
                    });
                    // 确保「其他」类别存在
                    if (!customCategories.includes('其他')) {
                        customCategories.push('其他');
                        saveCategories();
                    }
                    saveData();
                    renderCategoryList();
                    updateSubManageSelect();
                    renderSubcategoryListInModal();
                    // 刷新菜谱库
                    const activePage = document.querySelector('.nav-item.active').dataset.page;
                    if (activePage === 'recipe') {
                        const mainContent = document.getElementById('mainContent');
                        mainContent.innerHTML = renderRecipePage();
                        initRecipe();
                        initCategoryEditor();
                    }
                }
            }
        };
    });
}

    function saveSettings() { localStorage.setItem('github_token', document.getElementById('githubToken').value); localStorage.setItem('gist_id', document.getElementById('gistId').value); document.getElementById('syncStatus').innerText = '✅ 设置已保存'; setTimeout(()=>{ if(document.getElementById('syncStatus')) document.getElementById('syncStatus').innerText = '就绪'; },2000); }
    async function syncToGist() { const token = localStorage.getItem('github_token'); const gistId = localStorage.getItem('gist_id'); if(!token || !gistId){ document.getElementById('syncStatus').innerText = '❌ 请先保存Token和Gist ID'; return; } try { const data = { recipes, userData }; const res = await fetch(`https://api.github.com/gists/${gistId}`, { method: 'PATCH', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ files: { 'cook_diary.json': { content: JSON.stringify(data) } } }) }); if(res.ok) document.getElementById('syncStatus').innerText = '✅ 同步成功！'; else document.getElementById('syncStatus').innerText = '❌ 同步失败'; } catch(e) { document.getElementById('syncStatus').innerText = '❌ 网络错误'; } }
    async function restoreFromGist() { const token = localStorage.getItem('github_token'); const gistId = localStorage.getItem('gist_id'); if(!token || !gistId){ document.getElementById('syncStatus').innerText = '❌ 请先保存Token和Gist ID'; return; } try { const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { 'Authorization': `token ${token}` } }); if(res.ok){ const data = await res.json(); const content = data.files['cook_diary.json']?.content; if(content){ const parsed = JSON.parse(content); recipes = parsed.recipes; userData = parsed.userData; saveData(); document.getElementById('syncStatus').innerText = '✅ 恢复成功！'; location.reload(); } else throw new Error(); } else document.getElementById('syncStatus').innerText = '❌ 恢复失败'; } catch(e) { document.getElementById('syncStatus').innerText = '❌ 恢复失败'; } }
    
    loadData();
    applyTheme();
    document.getElementById('switchUserBtn').addEventListener('click', switchUser);
    document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', () => showPage(item.dataset.page)));
    // 从 localStorage 读取上次所在的页面，如果没有则默认为 plan
const lastPage = localStorage.getItem('last_page') || 'plan';
showPage(lastPage);
    
    document.getElementById('saveSettingsBtn').addEventListener('click', saveSettings);
    document.getElementById('syncToGistBtn').addEventListener('click', syncToGist);
    document.getElementById('restoreFromGistBtn').addEventListener('click', restoreFromGist);
    document.getElementById('closeSettingsBtn').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('active'));
    document.getElementById('confirmAddMealBtn').addEventListener('click', addNewMeal);
    document.getElementById('cancelAddMealBtn').addEventListener('click', () => document.getElementById('addMealModal').classList.remove('active'));
    document.getElementById('previewCloseBtn').onclick = () => document.getElementById('previewModal').classList.remove('active');
    




// 初始化图片上传功能
function initImageUpload() {
    const imageUpload = document.getElementById('editImageUpload');
    if (imageUpload) {
        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('editImagePreview');
                    preview.innerHTML = `<img src="${event.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                    // 保存图片为base64格式
                    if (!document.getElementById('editImageUrl')) {
                        const hiddenInput = document.createElement('input');
                        hiddenInput.type = 'hidden';
                        hiddenInput.id = 'editImageUrl';
                        document.querySelector('#editModal .modal-content').appendChild(hiddenInput);
                    }
                    document.getElementById('editImageUrl').value = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    }
}

// 预览弹窗 - 从当前计划中删除菜谱
document.getElementById('previewRemoveFromPlanBtn').onclick = () => {
    if (currentPreviewSource !== 'plan') return;
    if (!currentPreview) {
        alert('请先选择一个菜谱');
        return;
    }
    
    const recipeName = currentPreview.name;
    const plan = currentPlan()[selectedDate];
    const recipeId = currentPreview.id;
    
    if (!plan) {
        alert('计划数据不存在');
        return;
    }
    
    let removed = false;
    let removedFrom = [];
    
    // 遍历当天所有餐次
    for (let meal in plan) {
        if (plan[meal] && typeof plan[meal] === 'object') {
            for (let cat in plan[meal]) {
                const list = plan[meal][cat];
                if (Array.isArray(list)) {
                    const index = list.indexOf(recipeName);
                    if (index !== -1) {
                        list.splice(index, 1);
                        removed = true;
                        removedFrom.push(`${meal}·${cat}`);
                        
                        // 删除对应的历史记录（只删除当天的）
                        const historyKey = `${selectedDate}${meal}`;
                        const historyList = userData[currentUser].history[recipeId];
                        if (historyList) {
                            const historyIndex = historyList.indexOf(historyKey);
                            if (historyIndex !== -1) {
                                historyList.splice(historyIndex, 1);
                            }
                        }
                    }
                }
            }
        }
    }
    
    if (removed) {
        saveData();
        const activePage = document.querySelector('.nav-item.active')?.dataset.page;
        if (activePage === 'plan') {
            refreshPlan();
        }
        // 如果当前在菜谱库页面，刷新计数显示
        if (activePage === 'recipe') {
            const activeCat = document.querySelector('.filter-tag.active');
            const category = activeCat ? activeCat.dataset.category : 'all';
            const searchValue = document.getElementById('recipeSearch') ? document.getElementById('recipeSearch').value : '';
            renderLibrary(category, searchValue);
        }
        alert(`已从 ${selectedDate} 的计划中删除「${recipeName}」`);
    } else {
        alert(`「${recipeName}」不在 ${selectedDate} 的计划中`);
    }
    
    document.getElementById('previewModal').classList.remove('active');
};

// 预览弹窗 - 关闭按钮
document.getElementById('previewCloseBtn').onclick = () => {
    document.getElementById('previewModal').classList.remove('active');
};

document.getElementById('saveEditBtn').onclick = () => {
    const editId = document.getElementById('editId').value;
    const newName = document.getElementById('editName').value.trim();
    const newMainCat = document.getElementById('editMainCategory').value;
    const newSubCat = document.getElementById('editSubCategory').value;
    const newQuantity = document.getElementById('editQuantity').value;
    const newImageUrl = document.getElementById('editImageUrl') ? document.getElementById('editImageUrl').value : '';
    
    if (!newName) {
        alert('请输入菜谱名称');
        return;
    }
    
    const currentRecipesList = currentRecipes();
    
    if (editId) {
        const recipe = currentRecipesList.find(r => r.id == parseInt(editId));
        if (recipe) {
            recipe.name = newName;
            recipe.mainCat = newMainCat;
            recipe.subCat = newSubCat;
            recipe.quantity = newQuantity;
            recipe.image = newImageUrl;
        }
    } else {
        const newId = Math.max(...currentRecipesList.map(r => r.id), 0) + 1;
        currentRecipesList.push({
            id: newId,
            name: newName,
            mainCat: newMainCat,
            subCat: newSubCat,
            quantity: newQuantity,
            image: newImageUrl
        });
        if (!userData[currentUser].history[newId]) {
            userData[currentUser].history[newId] = [];
        }
    }
    
    saveData();
    document.getElementById('editModal').classList.remove('active');
    
    const activePage = document.querySelector('.nav-item.active').dataset.page;
    if (activePage === 'recipe') {
        initRecipe();
    }
};



document.getElementById('deleteBtn').onclick = () => {
    const editId = document.getElementById('editId').value;
    if (!editId) {
        alert('请先保存菜谱后再删除');
        return;
    }
    if(confirm('删除菜谱？')){
        const idx = currentRecipes().findIndex(r => r.id == parseInt(editId));
        if(idx !== -1) currentRecipes().splice(idx, 1);
        saveData();
        document.getElementById('editModal').classList.remove('active');
        const activePage = document.querySelector('.nav-item.active').dataset.page;
        if(activePage === 'recipe') initRecipe();
        currentPreview = null;
    }
};

// 关闭编辑弹窗
document.getElementById('closeEditBtn').onclick = () => document.getElementById('editModal').classList.remove('active');

// 初始化图片上传
initImageUpload();
