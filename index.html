/* 月历页面样式 */
.calendar-page {
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    background: white;
    padding: 12px;
}

.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--primary-bg);
    border-radius: 20px;
    margin-bottom: 16px;
    flex-shrink: 0;
}

.calendar-month-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--primary);
}

.calendar-nav-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--primary);
    padding: 4px 12px;
}

.calendar-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
    flex: 1;
}

.calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    padding: 8px 0;
    margin-bottom: 8px;
    flex-shrink: 0;
}

.weekday {
    font-size: 12px;
    font-weight: 500;
    color: var(--primary);
}

.calendar-days {
    display: flex;
    flex-direction: column;
    gap: 0;
}

.calendar-day-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
}

.calendar-day-cell {
    padding: 8px 4px;
    vertical-align: top;
    display: flex;
    flex-direction: column;
    height: auto;
    min-height: 0;
}

.calendar-day-cell:last-child {
    border-right: none;
}

/* 确保同一行的所有单元格高度一致 */
.calendar-day-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    align-items: start;
}

.calendar-day-cell:last-child {
    border-right: none;
}

/* 没有底边框的行（最后一行）通过父容器控制，这里不处理 */

.day-number {
    font-size: 14px;

}

.day-meal-item {

.meal-time-badge {
    font-size: 9px;

    background: #f5f5f5;
    padding: 2px 6px;
    border-radius: 10px;
    display: inline-block;
    width: fit-content;
}

.day-recipe-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-left: 4px;
}

.recipe-dot-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    line-height: 1.3;

}

.recipe-color-dot {
    width: 3px;

}

}

.empty-day {

];
    
    let recipes = { mom: [], baby: [] };
    let userData = { mom: { planData: {}, history: {}, mealOrder: {} }, baby: { planData: {}, history: {}, mealOrder: {} } };
    let defaultMeals = ['早餐', '午餐', '晚餐'];
    let customCategories = ['主食', '蔬菜', '肉鱼', '蛋', '油脂', '水果']; // 默认分类
// 子分类数据
let subCategories = {
    '蔬菜': ['叶菜类', '根茎类', '瓜果类'],
    '主食': ['米食', '面食', '杂粮'],
    '肉鱼': ['肉类', '海鲜'],
    '蛋': ['鸡蛋', '鸭蛋'],
    '油脂': ['植物油', '坚果'],
    '水果': ['浆果', '柑橘', '热带']
};



    function getWeekDates() {
        const today = new Date();
        const start = new Date(today);
        start.setDate(today.getDate() - today.getDay() + 1);
        let dates = [];
        const weekNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
        for (let i = 0; i < 7; i++) {
            const d = new Date(start);
            d.setDate(start.getDate() + i);
            const m = d.getMonth() + 1, day = d.getDate();
            dates.push({ dateStr: `${m.toString().padStart(2,'0')}/${day.toString().padStart(2,'0')}`, week: weekNames[i], fullDate: d, isToday: d.toDateString() === today.toDateString() });
        }
        return dates;
    }
    let weekDates = getWeekDates();
    let currentTimeRange = 'month'; // 'month', 'quarter', 'year', 'all'
    function initEmptyPlan() { 
    let empty = {}; 
    weekDates.forEach(d => { 
        empty[d.dateStr] = {}; 
        defaultMeals.forEach(m => { 
            let mealObj = {};
            customCategories.forEach(cat => {
                mealObj[cat] = [];
            });
            empty[d.dateStr][m] = mealObj;
        }); 
    }); 
    return empty; 
}


// 保存子分类

    localStorage.setItem('sub_categories', JSON.stringify(subCategories));
}

function loadSubCategories() {
    const saved = localStorage.getItem('sub_categories');
    if (saved) {
        try {
            subCategories = JSON.parse(saved);

    for (let cat of customCategories) {
        if (!subCategories[cat]) subCategories[cat] = [];

}

// 加载类别

// 加载类别
function loadCategories() {
    const saved = localStorage.getItem('custom_categories');
    if (saved) {
        try {
            customCategories = JSON.parse(saved);
            if (!Array.isArray(customCategories)) {
                customCategories = [];
            }
        } catch(e) {
            customCategories = [];
        }
    }
    
    // 首次使用或数据损坏时，设置默认分类
    if (!customCategories || customCategories.length === 0) {
        customCategories = ['主食', '蔬菜', '肉鱼', '蛋', '油脂', '水果'];
        saveCategories();
    }
    
    // 【新增】清理子分类数据中不在 customCategories 中的孤立键
    if (subCategories) {
        for (let cat in subCategories) {
            if (!customCategories.includes(cat)) {
                delete subCategories[cat];
            }
        }
        saveSubCategories();
    }
}
// 购物数据存储
let shoppingData = {
    fridge: [],  // 冰箱（已有）
    buy: []      // 待买
};

// 加载购物数据
function loadShoppingData() {
    const saved = localStorage.getItem('shopping_data');
    if (saved) {
        try {
            shoppingData = JSON.parse(saved);
        } catch(e) {}
    }
    if (!shoppingData.fridge) shoppingData.fridge = [];
    if (!shoppingData.buy) shoppingData.buy = [];
}
loadShoppingData();  // 加载购物数据
// 保存购物数据
function saveShoppingData() {
    localStorage.setItem('shopping_data', JSON.stringify(shoppingData));
}

// 添加购物项
function addShoppingItem(name, category, subCategory, location) {
    if (!name.trim()) {
        alert('请输入食材名称');
        return false;
    }
    
    const targetList = shoppingData[location];
    const existing = targetList.find(item => item.name === name);
    
    if (existing) {
        alert(`⚠️ "${name}" 已存在于${location === 'fridge' ? '冰箱' : '待买'}列表中！`);
        return false;
    }
    
    targetList.push({
        id: Date.now(),
        name: name.trim(),
        category: category,
        subCategory: subCategory || '',
        checked: false,
        createdAt: new Date().toISOString()
    });
    
    sortShoppingList(location);
    saveShoppingData();
    return true;
}



// 按主分类顺序排序
function sortShoppingList(location) {
    const categoryOrder = {};
    customCategories.forEach((cat, index) => {
        categoryOrder[cat] = index;
    });
    
    shoppingData[location].sort((a, b) => {
        const orderA = categoryOrder[a.category] ?? 999;
        const orderB = categoryOrder[b.category] ?? 999;
        if (orderA !== orderB) return orderA - orderB;
        return a.name.localeCompare(b.name);
    });
}

// 删除购物项
function deleteShoppingItem(location, id) {
    shoppingData[location] = shoppingData[location].filter(item => item.id !== id);
    saveShoppingData();
}

  




// 切换勾选状态
function toggleShoppingItem(location, id) {
    const item = shoppingData[location].find(i => i.id === id);
    if (item) {
        item.checked = !item.checked;
        saveShoppingData();
    }
}

// 编辑购物项名称
function editShoppingItem(location, id, newName) {
    if (!newName.trim()) return;
    const item = shoppingData[location].find(i => i.id === id);
    if (item) {
        // 检查重名
        const duplicate = shoppingData[location].some(i => i.id !== id && i.name === newName.trim());
        if (duplicate) {
            alert(`⚠️ "${newName}" 已存在！`);
            return;
        }
        item.name = newName.trim();
        sortShoppingList(location);
        saveShoppingData();
    }
}



function loadData() {
    loadCategories();
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            const data = JSON.parse(saved);
            if (data.recipes && !data.recipes.mom) {
                const oldRecipes = data.recipes;
                recipes = {
                    mom: [...oldRecipes],
                    baby: [...oldRecipes]
                };
            } else {
                recipes = data.recipes || { mom: [...defaultRecipes], baby: [...defaultRecipes] };
            }
            userData = data.userData || { mom: { planData: initEmptyPlan(), history: {}, mealOrder: {} }, baby: { planData: initEmptyPlan(), history: {}, mealOrder: {} } };
        } catch(e) {
            recipes = { mom: [...defaultRecipes], baby: [...defaultRecipes] };
            userData = { mom: { planData: initEmptyPlan(), history: {}, mealOrder: {} }, baby: { planData: initEmptyPlan(), history: {}, mealOrder: {} } };
        }
    } else {
        recipes = { mom: [...defaultRecipes], baby: [...defaultRecipes] };
        userData = { mom: { planData: initEmptyPlan(), history: {}, mealOrder: {} }, baby: { planData: initEmptyPlan(), history: {}, mealOrder: {} } };
    }
    
    if (!recipes.mom) recipes.mom = [...defaultRecipes];
    if (!recipes.baby) recipes.baby = [...defaultRecipes];
    
    ['mom','baby'].forEach(u => {
        if (!userData[u].planData) userData[u].planData = initEmptyPlan();
        if (!userData[u].history) userData[u].history = {};
        if (!userData[u].mealOrder) userData[u].mealOrder = {};
        (recipes[u] || []).forEach(r => { 
            if (!userData[u].history[r.id]) userData[u].history[r.id] = []; 
        });
        weekDates.forEach(d => {
            if (!userData[u].planData[d.dateStr]) {
                userData[u].planData[d.dateStr] = {};
                defaultMeals.forEach(m => { 
                    let mealObj = {};
                    customCategories.forEach(cat => {
                        mealObj[cat] = [];
                    });
                    userData[u].planData[d.dateStr][m] = mealObj;
                });
            }
        });
    });
    
    ['mom', 'baby'].forEach(u => {
        (recipes[u] || []).forEach(recipe => {
            if (recipe.category && !recipe.mainCat) {
                recipe.mainCat = recipe.category;
                recipe.subCat = recipe.subCat || '';
                recipe.quantity = recipe.quantity || '';
                delete recipe.category;
            }
        });
    });
}


    function currentRecipes() {

}

    const savedColors = localStorage.getItem('category_colors');
    if (savedColors) {
        const colors = JSON.parse(savedColors);
        if (colors[category]) {

        }
    }
    
    // 预定义颜色映射
    const colorMap = {
        '主食': { bg: '#fff3e0', text: '#c97e0a' },
        '蔬菜': { bg: '#e8f5e9', text: '#2e7d32' },
        '肉鱼': { bg: '#ffebee', text: '#c62828' },
        '蛋': { bg: '#fff9c4', text: '#b26a00' },
        '油脂': { bg: '#f3e5f5', text: '#7b1fa2' },
        '水果': { bg: '#e1f5fe', text: '#0288d1' }
    };
    
    if (colorMap[category]) {
        return colorMap[category];
    }
    
    // 新分类生成默认颜色
    let hash = 0;
    for (let i = 0; i < category.length; i++) {
        hash = ((hash << 5) - hash) + category.charCodeAt(i);
        hash = hash & hash;
    }
    const hue = Math.abs(hash % 360);
    
    return {
        bg: `hsl(${hue}, 60%, 88%)`,
        text: `hsl(${hue}, 70%, 35%)`
    };
}

    function currentPlan() { return userData[currentUser].planData; }
    function currentMealOrder() { return userData[currentUser].mealOrder; }
    
    function currentHistory(rid, timeRange = null) {
    const range = timeRange || currentTimeRange;
    const allHistory = userData[currentUser].history[rid] || [];
    if (range === 'all') return allHistory;
    
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth(); // 0-11
    
    return allHistory.filter(record => {
        // 记录格式如 "03/23早餐" 或 "03/23午餐"
        const datePart = record.substring(0, 5); // 取 "03/23"
        const [month, day] = datePart.split('/');
        const recordDate = new Date(currentYear, parseInt(month) - 1, parseInt(day));
        
        if (range === 'month') {
            // 同一个月
            return recordDate.getMonth() === currentMonth && recordDate.getFullYear() === currentYear;
        } else if (range === 'quarter') {
            // 本季度
            const currentQuarter = Math.floor(currentMonth / 3);
            const recordQuarter = Math.floor(recordDate.getMonth() / 3);
            return recordQuarter === currentQuarter && recordDate.getFullYear() === currentYear;
        } else if (range === 'year') {
            // 本年
            return recordDate.getFullYear() === currentYear;
        }
        return true;
    });
}

function shiftWeek(days) {
    weekDates.forEach(d => { 
        d.fullDate.setDate(d.fullDate.getDate() + days); 
        const m = d.fullDate.getMonth()+1, day = d.fullDate.getDate(); 
        d.dateStr = `${m.toString().padStart(2,'0')}/${day.toString().padStart(2,'0')}`; 
        d.isToday = d.fullDate.toDateString() === new Date().toDateString(); 
    });
    selectedDate = weekDates.find(d => d.isToday)?.dateStr || weekDates[0].dateStr;
    
    // 更新计划数据结构...
    ['mom','baby'].forEach(u => { 
        let np = {}; 
        weekDates.forEach(w => { 
            np[w.dateStr] = userData[u].planData[w.dateStr] || {}; 
            if(Object.keys(np[w.dateStr]).length === 0) { 
                np[w.dateStr] = {}; 
                defaultMeals.forEach(m => { 
                   let mealObj = {};
customCategories.forEach(cat => {
    mealObj[cat] = [];
});
np[w.dateStr][m] = mealObj;
                }); 
            } 
        }); 
        userData[u].planData = np; 
    });
    saveData();
    
    const mainContent = document.getElementById('mainContent');
    if (document.querySelector('.nav-item.active').dataset.page === 'plan') { 
        mainContent.innerHTML = renderPlanPage(); 
        // 重置初始化标志，因为 DOM 重新创建了
        dateNavInitialized = false;
        refreshPlan(); 
        attachDateNav(); 
    }
}
    function attachDateNav() {
    // 如果已经初始化过，直接返回，避免重复绑定
    if (dateNavInitialized) return;
    dateNavInitialized = true;
    
    // 绑定日期点击事件
    document.querySelectorAll('.date-item').forEach(el => {
        el.addEventListener('click', () => { 
            selectedDate = el.dataset.date; 
            
            // 手动更新日期高亮
            document.querySelectorAll('.date-item').forEach(item => {
                item.classList.remove('active');
            });
            el.classList.add('active');
            
            refreshPlan(); 
        });
    });
    
    // 绑定周箭头事件
    const weekNav = document.querySelector('.week-nav-container');
    if (weekNav && !weekNav._hasListener) {
        weekNav.addEventListener('click', (e) => {
            const target = e.target.closest('.week-arrow');
            if (!target) return;
            if (target.classList.contains('prev')) shiftWeek(-7);
            else if (target.classList.contains('next')) shiftWeek(7);
        });
        weekNav._hasListener = true;
    }
    
    // 绑定设置按钮事件
    const sidebarBtn = document.getElementById('sidebarSettingsBtn');
    if (sidebarBtn && !sidebarBtn._hasListener) {
        sidebarBtn.addEventListener('click', () => {
            document.getElementById('githubToken').value = localStorage.getItem('github_token') || '';
            document.getElementById('gistId').value = localStorage.getItem('gist_id') || '';
            document.getElementById('settingsModal').classList.add('active');
        });
        sidebarBtn._hasListener = true;
    }
}


   function addToPlan(recipeName) {
    if (!selectedMeal || !selectedCategory) return;
    const plan = currentPlan()[selectedDate];
    
    // 如果该餐次不存在，创建动态分类结构
    if (!plan[selectedMeal]) {
        let mealObj = {};
        customCategories.forEach(cat => {
            mealObj[cat] = [];
        });
        plan[selectedMeal] = mealObj;
    }
    
    // 如果该分类不存在，创建数组
    if (!plan[selectedMeal][selectedCategory]) {
        plan[selectedMeal][selectedCategory] = [];
    }
    
    // 如果菜谱不在计划中，添加
    if (!plan[selectedMeal][selectedCategory].includes(recipeName)) {
        plan[selectedMeal][selectedCategory].push(recipeName);
        const recipe = currentRecipes().find(r => r.name === recipeName);
        if (recipe) addHistory(recipe.id, `${selectedDate}${selectedMeal}`);
        saveData();
        refreshPlan();
    }
}

// 获取某月的日历数据
function getCalendarDays(year, month) {
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startWeekday = firstDay.getDay(); // 0=周日, 调整为周一为第一天
    const adjustedStart = startWeekday === 0 ? 6 : startWeekday - 1;
    
    const daysInMonth = lastDay.getDate();
    const days = [];
    
    // 填充上个月的日期
    const prevMonthLastDay = new Date(year, month, 0).getDate();
    for (let i = adjustedStart - 1; i >= 0; i--) {
        days.push({
            year: month === 0 ? year - 1 : year,
            month: month === 0 ? 11 : month - 1,
            day: prevMonthLastDay - i,
            isCurrentMonth: false
        });
    }
    
    // 当月日期
    for (let i = 1; i <= daysInMonth; i++) {
        days.push({
            year: year,
            month: month,
            day: i,
            isCurrentMonth: true
        });
    }
    
    // 填充下个月的日期，凑满42格（6行）
    const remaining = 42 - days.length;
    for (let i = 1; i <= remaining; i++) {
        days.push({
            year: month === 11 ? year + 1 : year,
            month: month === 11 ? 0 : month + 1,
            day: i,
            isCurrentMonth: false
        });
    }
    
    return days;
}

// 获取某天某餐次的菜谱（按分类顺序，每个菜谱前有颜色竖）
function getDayMealsWithColor(year, month, day) {
    const dateStr = `${(month+1).toString().padStart(2,'0')}/${day.toString().padStart(2,'0')}`;
    const plan = currentPlan()[dateStr];
    if (!plan) return [];
    
    const meals = getMealsForDate(dateStr);
    const result = [];
    
    for (let meal of meals) {
        const mealData = plan[meal];
        if (!mealData) continue;
        
        const recipesInMeal = [];
        for (let cat of customCategories) {
            const recipeList = mealData[cat] || [];
            for (let recipeName of recipeList) {
                const recipe = currentRecipes().find(r => r.name === recipeName);
                if (recipe) {
                    recipesInMeal.push({
                        name: recipeName,
                        category: recipe.mainCat,
                        meal: meal
                    });
                }
            }
        }
        
        if (recipesInMeal.length > 0) {
            result.push({
                meal: meal,
                recipes: recipesInMeal
            });
        }
    }
    
    return result;
}

// 渲染指定月份
function renderCalendarMonth(year, month) {
    const days = getCalendarDays(year, month);
    const today = new Date();
    const isToday = (y, m, d) => y === today.getFullYear() && m === today.getMonth() && d === today.getDate();
    
    // 按行分组
    const rows = [];
    for (let i = 0; i < days.length; i += 7) {
        rows.push(days.slice(i, i + 7));
    }
    
    const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
    
    return `
        <div class="calendar-page">
            <div class="calendar-header">
                <button class="calendar-nav-btn" id="prevMonthBtn">◀</button>
                <span class="calendar-month-title">${year}年 ${monthNames[month]}</span>
                <button class="calendar-nav-btn" id="nextMonthBtn">▶</button>
            </div>
            <div class="calendar-grid">
                <div class="calendar-weekdays">
                    <span class="weekday">一</span>
                    <span class="weekday">二</span>
                    <span class="weekday">三</span>
                    <span class="weekday">四</span>
                    <span class="weekday">五</span>
                    <span class="weekday">六</span>
                    <span class="weekday">日</span>
                </div>
                <div class="calendar-days">
                    ${rows.map(row => `
                        <div class="calendar-day-row">
                            ${row.map(day => {
                                const isCurrentMonth = day.isCurrentMonth;
                                const dayNum = day.day;
                                const dateStr = `${(day.month+1).toString().padStart(2,'0')}/${dayNum.toString().padStart(2,'0')}`;
                                const mealsData = isCurrentMonth ? getDayMealsWithColor(day.year, day.month, dayNum) : [];
                                const isTodayFlag = isToday(day.year, day.month, dayNum);
                                
                                return `
                                    <div class="calendar-day-cell">
                                        <div class="day-number">
                                           <span class="${isTodayFlag ? 'today' : ''}" style="${!isCurrentMonth ? 'color: #bbb; font-weight: normal;' : ''}">${dayNum}</span>
                                            </div>
                                        <div class="day-meals">
                                            ${isCurrentMonth && mealsData.length > 0 ? mealsData.map(mealItem => `
                                                <div class="day-meal-item">
                                                    <span class="meal-time-badge">${mealItem.meal}</span>
                                                    <div class="day-recipe-list">
                                                        ${mealItem.recipes.map(recipe => `
                                                            <div class="recipe-dot-item">
                                                                <span class="recipe-color-dot" style="background: ${getCategoryDotColor(recipe.category)};"></span>
                                                                <span class="recipe-name-text" title="${recipe.name}">${recipe.name}</span>
                                                            </div>
                                                        `).join('')}
                                                    </div>
                                                </div>
                                            `).join('') : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>
    `;
}

// HTML转义
function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

    function getCurrentCategoryColors(cat) {
        const savedColors = localStorage.getItem('category_colors');
        if (savedColors) {
            const colors = JSON.parse(savedColors);
            if (colors[cat]) return colors[cat];
        }
        const colorMap = {
            '主食': { bg: '#fff3e0', text: '#c97e0a' },
            '蔬菜': { bg: '#e8f5e9', text: '#2e7d32' },

        const hash = cat.split('').reduce((a,b)=>a+b.charCodeAt(0),0);

// 将 rgb/hsl 转换为 hex 颜色值（简化版）
function rgbToHex(color) {
    if (!color) return '#ffffff';
    // 如果是 hex 格式直接返回
    if (color.startsWith('#')) return color;
    // 如果是 hsl 格式，创建临时元素来获取 rgb 值
    const div = document.createElement('div');
    div.style.color = color;
    document.body.appendChild(div);
    const rgb = getComputedStyle(div).color;
    document.body.removeChild(div);
    
    // 解析 rgb(r, g, b)
    const match = rgb.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
    if (match) {
        const hex = '#' + ((1 << 24) + (parseInt(match[1]) << 16) + (parseInt(match[2]) << 8) + parseInt(match[3])).toString(16).slice(1);
        return hex;
    }
    return '#ffffff';
}

            const location = btn.dataset.location;
            if (!isNaN(id) && location && confirm('确定删除吗？')) {
                deleteShoppingItem(location, id);
                const mainContent = document.getElementById('mainContent');
                if (mainContent) {
                    mainContent.innerHTML = renderShoppingPage();
                    initShoppingPage();
                }
            }
        };
    });
    
    // 编辑名称（双击）
    const nameSpans = document.querySelectorAll('.shopping-item-name');
    nameSpans.forEach(nameSpan => {
        nameSpan.ondblclick = (e) => {
            e.stopPropagation();
            const id = parseInt(nameSpan.dataset.id);
            const location = nameSpan.dataset.location;
            const oldName = nameSpan.dataset.name;
            if (!isNaN(id) && location) {
                const newName = prompt('编辑食材名称', oldName);
                if (newName && newName !== oldName) {
                    editShoppingItem(location, id, newName);
                    const mainContent = document.getElementById('mainContent');
                    if (mainContent) {
                        mainContent.innerHTML = renderShoppingPage();
                        initShoppingPage();
                    }
                }
            }
        };
    });
}

// 预览弹窗 - 从当前计划中删除菜谱
document.getElementById('previewRemoveFromPlanBtn').onclick = () => {
    if (currentPreviewSource !== 'plan') return;
    if (!currentPreview) {
        alert('请先选择一个菜谱');
        return;
    }
    
    const recipeName = currentPreview.name;
    const plan = currentPlan()[selectedDate];
    const recipeId = currentPreview.id;
    
    if (!plan) {
        alert('计划数据不存在');
        return;
    }
    
    let removed = false;
    let removedFrom = [];
    
    // 遍历当天所有餐次
    for (let meal in plan) {
        if (plan[meal] && typeof plan[meal] === 'object') {
            for (let cat in plan[meal]) {
                const list = plan[meal][cat];
                if (Array.isArray(list)) {
                    const index = list.indexOf(recipeName);
                    if (index !== -1) {
                        list.splice(index, 1);
                        removed = true;
                        removedFrom.push(`${meal}·${cat}`);
                        
                        // 删除对应的历史记录（只删除当天的）
                        const historyKey = `${selectedDate}${meal}`;
                        const historyList = userData[currentUser].history[recipeId];
                        if (historyList) {
                            const historyIndex = historyList.indexOf(historyKey);
                            if (historyIndex !== -1) {
                                historyList.splice(historyIndex, 1);
                            }
                        }
                    }
                }
            }
        }
    }
    
    if (removed) {
        saveData();
        const activePage = document.querySelector('.nav-item.active')?.dataset.page;
        if (activePage === 'plan') {
            refreshPlan();
        }
        // 如果当前在菜谱库页面，刷新计数显示
        if (activePage === 'recipe') {
            const activeCat = document.querySelector('.filter-tag.active');
            const category = activeCat ? activeCat.dataset.category : 'all';
            const searchValue = document.getElementById('recipeSearch') ? document.getElementById('recipeSearch').value : '';
            renderLibrary(category, searchValue);
        }
        alert(`已从 ${selectedDate} 的计划中删除「${recipeName}」`);
    } else {
        alert(`「${recipeName}」不在 ${selectedDate} 的计划中`);
    }
    
    document.getElementById('previewModal').classList.remove('active');
};

document.getElementById('saveEditBtn').onclick = () => {
    const editId = document.getElementById('editId').value;
    const newName = document.getElementById('editName').value.trim();
    const newMainCat = document.getElementById('editMainCategory').value;
    const newSubCat = document.getElementById('editSubCategory').value;
    const newQuantity = document.getElementById('editQuantity').value;
    const newImageUrl = document.getElementById('editImageUrl') ? document.getElementById('editImageUrl').value : '';
    
    if (!newName) {
        alert('请输入菜谱名称');
        return;
    }
    
    const currentRecipesList = currentRecipes();
    
    if (editId) {
        const recipe = currentRecipesList.find(r => r.id == parseInt(editId));
        if (recipe) {
            recipe.name = newName;
            recipe.mainCat = newMainCat;
            recipe.subCat = newSubCat;
            recipe.quantity = newQuantity;
            recipe.image = newImageUrl;
        }
    } else {
        const newId = Math.max(...currentRecipesList.map(r => r.id), 0) + 1;
        currentRecipesList.push({
            id: newId,
            name: newName,
            mainCat: newMainCat,
            subCat: newSubCat,
            quantity: newQuantity,
            image: newImageUrl
        });
        if (!userData[currentUser].history[newId]) {
            userData[currentUser].history[newId] = [];
        }
    }
    
    saveData();
    document.getElementById('editModal').classList.remove('active');
    
    const activePage = document.querySelector('.nav-item.active').dataset.page;
    if (activePage === 'recipe') {
        initRecipe();
    }
};



document.getElementById('deleteBtn').onclick = () => {
    const editId = document.getElementById('editId').value;
    if (!editId) {
        alert('请先保存菜谱后再删除');
        return;
    }
    if(confirm('删除菜谱？')){
        const idx = currentRecipes().findIndex(r => r.id == parseInt(editId));
        if(idx !== -1) currentRecipes().splice(idx, 1);
        saveData();
        document.getElementById('editModal').classList.remove('active');
        const activePage = document.querySelector('.nav-item.active').dataset.page;
        if(activePage === 'recipe') initRecipe();
        currentPreview = null;
    }
};

// 打开添加菜谱弹窗，并自动选中指定的主分类
function openAddRecipeModalWithCategory(category) {
    // 清空表单
    document.getElementById('editId').value = '';
    document.getElementById('editName').value = '';
    
    // 更新主分类下拉框选项
    const mainCatSelect = document.getElementById('editMainCategory');
    if (mainCatSelect) {
        mainCatSelect.innerHTML = customCategories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
    }
    
    // 设置当前分类
    document.getElementById('editMainCategory').value = category;
    document.getElementById('editQuantity').value = '';
    
    // 清空并重新生成子分类下拉框
    const subSel = document.getElementById('editSubCategory');
    subSel.innerHTML = '<option value="">无子分类</option>';
    if (subCategories[category]) {
        subSel.innerHTML += subCategories[category].map(sub => `<option value="${sub}">${sub}</option>`).join('');
    }
    subSel.value = '';
    
    // 添加 change 事件监听
    const mainCatSelectForChange = document.getElementById('editMainCategory');
    const oldChangeHandler = mainCatSelectForChange._changeHandler;
    if (oldChangeHandler) mainCatSelectForChange.removeEventListener('change', oldChangeHandler);
    mainCatSelectForChange._changeHandler = () => {
        const selectedMain = mainCatSelectForChange.value;
        const subSelect = document.getElementById('editSubCategory');
        subSelect.innerHTML = '<option value="">无子分类</option>';
        if (subCategories[selectedMain]) {
            subSelect.innerHTML += subCategories[selectedMain].map(sub => `<option value="${sub}">${sub}</option>`).join('');
        }
        subSelect.value = '';
    };
    mainCatSelectForChange.addEventListener('change', mainCatSelectForChange._changeHandler);
    
    // 清空图片预览
    const previewDiv = document.getElementById('editImagePreview');
    previewDiv.innerHTML = '<span style="color: #999;">📷 暂无图片</span>';
    if (document.getElementById('editImageUrl')) {
        document.getElementById('editImageUrl').value = '';
    }
    
    // 设置弹窗标题
    document.querySelector('#editModal h3').innerText = '添加新菜谱';
    
    // 打开弹窗
    document.getElementById('editModal').classList.add('active');
}
