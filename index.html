<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🍳 料理计划</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f5f2ec;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* 头部 */
        .header {
            padding: 12px 16px;
            border-bottom: 1px solid #f0e9df;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fefcf9;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 500;
            color: #3a342b;
        }

        .header button {
            background: #eae3d8;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            color: #3a342b;
            border: 1px solid #ddd0c0;
            cursor: pointer;
        }

        /* 主内容区域 - 可滚动 */
       .main-content {
    flex: 1;
    overflow-y: auto;
    background: white;
    -webkit-overflow-scrolling: touch;
    height: 0; /* 关键：强制让它占满剩余空间 */
}

        /* 主布局：左侧日期 + 右侧计划 */
        .main-layout {
            display: flex;
            min-height: 100%;
        }

        /* 左侧日期栏（窄窄的） */
        .date-sidebar {
            width: 90px;
            background: #faf8f5;
            border-right: 1px solid #ece4d9;
            flex-shrink: 0;
        }

        .date-item {
            padding: 16px 6px;
            text-align: center;
            font-size: 14px;
            color: #5e5548;
            border-bottom: 1px solid #ece4d9;
            cursor: pointer;
            line-height: 1.4;
        }

        .date-item:last-child {
            border-bottom: none;
        }

        .date-item.active {
            background: #e6ded2;
            color: #2c241b;
            font-weight: 500;
            border-left: 3px solid #b8a68b;
        }

        .date-tag {
            display: inline-block;
            background: #d1c5b6;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 20px;
            margin-top: 4px;
            color: #3d3228;
        }

        /* 右侧计划区 */
        .plan-content {
            flex: 1;
            padding: 16px;
            background: white;
        }

        .selected-date-title {
            font-size: 18px;
            font-weight: 500;
            color: #2c241b;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f0e7db;
        }

        /* 三餐区块 */
        .meal-section {
            margin-bottom: 16px;
            border: 1px solid #f0e7db;
            border-radius: 12px;
            overflow: hidden;
        }

        .meal-header {
            background: #faf6f1;
            padding: 10px 14px;
            font-size: 15px;
            font-weight: 500;
            color: #3f382f;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meal-header .arrow {
            transition: transform 0.15s;
            font-size: 12px;
            color: #ab9a86;
        }

        .meal-header.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .meal-content {
            padding: 12px;
        }

        .meal-content.collapsed {
            display: none;
        }

        /* 分类行 */
        .category-row {
            margin-bottom: 16px;
        }

        .category-title {
            font-size: 13px;
            font-weight: 500;
            color: #716957;
            margin-bottom: 8px;
            border-bottom: 1px dashed #e5dcd0;
            padding-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        /* 菜谱卡片 */
        .recipe-card {
            width: calc(25% - 5px);
            min-width: 60px;
            background: #fdfbf9;
            border: 1px solid #e5dcd0;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            cursor: pointer;
            position: relative;
        }

        .card-image {
            height: 50px;
            background: #f2ede7;
            border-bottom: 1px solid #e5dcd0;
        }

        .recipe-name {
            padding: 5px 2px;
            font-size: 11px;
            color: #3f382f;
            word-break: break-word;
        }

        /* 小红点 */
        .red-dot {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #e06b6b;
            color: white;
            font-size: 9px;
            min-width: 16px;
            height: 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 加号按钮 */
        .add-btn-small {
            font-size: 16px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 20px;
            background: #f2ede7;
        }

        .add-btn-small:hover {
            background: #e5dcd0;
        }

        /* 菜谱库页 */
        .recipe-page {
            padding: 16px;
        }

        .recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .recipe-header h2 {
            font-size: 18px;
            font-weight: 500;
            color: #3a342b;
        }

        .search-box {
            background: #f5f2ec;
            border: 1px solid #e5dcd0;
            border-radius: 30px;
            padding: 6px 14px;
            width: 160px;
            font-size: 13px;
        }

        .category-filter {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding: 4px 0;
            -webkit-overflow-scrolling: touch;
        }

        .filter-tag {
            padding: 5px 12px;
            background: #f5f2ec;
            border-radius: 30px;
            font-size: 12px;
            color: #5e5548;
            white-space: nowrap;
            border: 1px solid #e5dcd0;
            cursor: pointer;
        }

        .filter-tag.active {
            background: #d1c5b6;
            color: #2c241b;
            border-color: #b8a68b;
        }

        .library-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        /* 搜索页 */
        .search-page {
            padding: 16px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e5dcd0;
            border-radius: 30px;
            font-size: 14px;
            margin-bottom: 20px;
            background: #f5f2ec;
        }

        .search-input:focus {
            outline: none;
            border-color: #b8a68b;
            background: white;
        }

        .recent-title {
            font-size: 14px;
            color: #8f8579;
            margin-bottom: 12px;
        }

        .recent-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .recent-tag {
            padding: 6px 14px;
            background: #f5f2ec;
            border-radius: 30px;
            font-size: 13px;
            color: #5e5548;
            cursor: pointer;
            border: 1px solid #e5dcd0;
        }

        .recent-tag:hover {
            background: #e5dcd0;
        }

        .search-results {
            margin-top: 16px;
        }

        .search-results-title {
            font-size: 14px;
            color: #8f8579;
            margin-bottom: 12px;
        }

        /* 底部导航 - 固定 */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 8px 12px 6px;
            border-top: 1px solid #f0e7db;
            background: white;
            flex-shrink: 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 13px;
            color: #8f8579;
        }

        .nav-item.active {
            background: #f2ede7;
            color: #2c241b;
            font-weight: 500;
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 380px;
            border-radius: 20px;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-recipe-name {
            font-size: 20px;
            font-weight: 500;
            margin: 8px 0;
        }

        .modal-stats {
            background: #f9f5f0;
            padding: 12px;
            border-radius: 12px;
            margin: 12px 0;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
            background: #f9f5f0;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 13px;
            margin: 12px 0;
        }

        .history-item {
            padding: 4px 0;
            border-bottom: 1px dashed #e5dcd0;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
        }

        .btn-primary {
            background: #d1c5b6;
            color: #2c241b;
        }

        .btn-secondary {
            background: #f2ede7;
            color: #5e5548;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 头部 -->
        <div class="header">
            <h1>🍳 料理日记</h1>
            <button id="newRecipeBtn" style="display: none;">+ 新建菜谱</button>
        </div>

        <!-- 主内容区域（可滚动） -->
        <div class="main-content" id="mainContent"></div>

        <!-- 底部导航（固定） -->
        <div class="bottom-nav">
            <div class="nav-item active" data-page="plan">📅 计划</div>
            <div class="nav-item" data-page="recipe">📖 菜谱</div>
            <div class="nav-item" data-page="search">🔍 搜索</div>
        </div>
    </div>

    <!-- 预览弹窗（带编辑按钮） -->
    <div class="modal" id="previewModal">
        <div class="modal-content">
            <div style="text-align: center; font-size: 48px;">🍳</div>
            <div class="modal-recipe-name" id="previewName">鳕鱼饼</div>
            
            <div class="modal-stats">
                <div class="stat-item"><span>总次数：</span><span id="previewTotal">8次</span></div>
                <div class="stat-item"><span>近30天：</span><span id="previewMonth">3次</span></div>
                <div class="stat-item"><span>上次：</span><span id="previewLast">03/11 早餐</span></div>
            </div>

            <div class="history-list" id="previewHistory"></div>

            <div class="modal-buttons">
                <button class="modal-btn btn-primary" id="previewEditBtn">编辑</button>
                <button class="modal-btn btn-secondary" id="previewCloseBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- 编辑菜谱弹窗 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 16px;">编辑菜谱</h3>
            <input type="hidden" id="editId">
            
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 14px; color: #666; margin-bottom: 4px;">菜名</label>
                <input type="text" id="editName" style="width: 100%; padding: 10px; border: 1px solid #e5dcd0; border-radius: 8px; font-size: 14px;">
            </div>
            
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 14px; color: #666; margin-bottom: 4px;">分类</label>
                <select id="editCategory" style="width: 100%; padding: 10px; border: 1px solid #e5dcd0; border-radius: 8px; font-size: 14px;">
                    <option value="主食">🍚 主食</option>
                    <option value="蔬菜">🥬 蔬菜</option>
                    <option value="肉鱼">🐟 肉鱼</option>
                    <option value="蛋">🥚 蛋</option>
                    <option value="油脂">🥜 油脂</option>
                    <option value="水果">🍎 水果</option>
                </select>
            </div>
            
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 14px; color: #666; margin-bottom: 4px;">历史记录</label>
                <div style="max-height: 150px; overflow-y: auto; border: 1px solid #e5dcd0; border-radius: 8px; padding: 8px;" id="editHistoryList"></div>
                <button style="margin-top: 8px; padding: 4px 8px; background: #f2ede7; border: none; border-radius: 20px; font-size: 12px; cursor: pointer;" id="addHistoryBtn">+ 添加记录</button>
            </div>
            
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 14px; color: #666; margin-bottom: 4px;">图片链接</label>
                <input type="text" id="editImage" style="width: 100%; padding: 10px; border: 1px solid #e5dcd0; border-radius: 8px; font-size: 14px;" placeholder="选填">
            </div>
            
            <div class="modal-buttons">
                <button class="modal-btn btn-primary" id="saveEditBtn">保存</button>
                <button class="modal-btn btn-secondary" id="deleteBtn">删除</button>
                <button class="modal-btn btn-secondary" id="closeEditBtn">取消</button>
            </div>
        </div>
    </div>

    <!-- 选择菜谱弹窗 -->
    <div class="modal" id="selectModal">
        <div class="modal-content" style="max-width: 350px;">
            <h3 style="margin-bottom: 16px;" id="selectTitle">选择菜谱</h3>
            <div class="library-grid" id="selectGrid" style="max-height: 400px; overflow-y: auto; margin-bottom: 16px;"></div>
            <button class="modal-btn btn-secondary" id="closeSelectBtn">取消</button>
        </div>
    </div>

    <script>
        // ---------- 本地存储 ----------
        const STORAGE_KEY = 'cook_diary_data';

        // 加载数据
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    return data;
                } catch (e) {
                    console.error('加载数据失败', e);
                }
            }
            return null;
        }

        // 保存数据
        function saveData() {
            const data = {
                recipes: recipes,
                planData: planData
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            console.log('数据已保存');
        }

        // ---------- 数据 ----------
        const weekDays = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];

        const today = new Date();
        const startOfWeek = new Date(today);
        startOfWeek.setDate(today.getDate() - today.getDay() + 1);

        const weekDates = [];
        for (let i = 0; i < 7; i++) {
            const d = new Date(startOfWeek);
            d.setDate(startOfWeek.getDate() + i);
            const month = d.getMonth() + 1;
            const day = d.getDate();
            weekDates.push({
                dateStr: `${month.toString().padStart(2, '0')}/${day.toString().padStart(2, '0')}`,
                fullDate: d,
                isToday: d.toDateString() === today.toDateString()
            });
        }

        // 默认数据
        const defaultRecipes = [
            { id: 1, name: '鳕鱼饼', category: '肉鱼', image: '', history: ['03/11早餐', '03/09午餐', '03/05晚餐'] },
            { id: 2, name: '蒸蛋', category: '蛋', image: '', history: ['03/11早餐', '03/08早餐', '03/06早餐', '03/03早餐', '03/01早餐'] },
            { id: 3, name: '炒鸡蛋', category: '蛋', image: '', history: ['03/11早餐', '03/10午餐', '03/07早餐', '03/04早餐'] },
            { id: 4, name: '西蓝花', category: '蔬菜', image: '', history: ['03/11早餐', '03/09晚餐'] },
            { id: 5, name: '蓝莓', category: '水果', image: '', history: ['03/11早餐', '03/08水果'] },
            { id: 6, name: '腰果', category: '油脂', image: '', history: ['03/11早餐'] },
            { id: 7, name: '藕片', category: '蔬菜', image: '', history: ['03/12午餐'] },
            { id: 8, name: '球生菜', category: '蔬菜', image: '', history: [] },
            { id: 9, name: '蝴蝶面', category: '主食', image: '', history: ['03/11早餐'] },
            { id: 10, name: '米饭', category: '主食', image: '', history: ['03/10午餐'] }
        ];

        let defaultPlanData = {};
        weekDates.forEach(d => {
            defaultPlanData[d.dateStr] = { 
                breakfast: { '主食': [], '蔬菜': [], '肉鱼': [], '蛋': [], '油脂': [], '水果': [] },
                lunch: { '主食': [], '蔬菜': [], '肉鱼': [], '蛋': [], '油脂': [], '水果': [] },
                dinner: { '主食': [], '蔬菜': [], '肉鱼': [], '蛋': [], '油脂': [], '水果': [] }
            };
        });

        // 从本地存储加载数据
        const savedData = loadData();
        let recipes = savedData ? savedData.recipes : [...defaultRecipes];
        let planData = savedData ? savedData.planData : {...defaultPlanData};

        // 如果没有planData的某些日期，补充默认值
        weekDates.forEach(d => {
            if (!planData[d.dateStr]) {
                planData[d.dateStr] = { 
                    breakfast: { '主食': [], '蔬菜': [], '肉鱼': [], '蛋': [], '油脂': [], '水果': [] },
                    lunch: { '主食': [], '蔬菜': [], '肉鱼': [], '蛋': [], '油脂': [], '水果': [] },
                    dinner: { '主食': [], '蔬菜': [], '肉鱼': [], '蛋': [], '油脂': [], '水果': [] }
                };
            }
        });

        let selectedDate = weekDates.find(d => d.isToday)?.dateStr || weekDates[0].dateStr;
        let selectedCategory = '';
        let selectedMeal = '';

        // 当前预览的菜谱
        let currentPreviewRecipe = null;

        // ---------- 页面切换 ----------
        function showPage(page) {
            const mainContent = document.getElementById('mainContent');
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.page === page);
            });
            
            if (page === 'plan') {
                mainContent.innerHTML = renderPlanPage();
                initPlanEvents();
            } else if (page === 'recipe') {
                mainContent.innerHTML = renderRecipePage();
                initRecipeEvents();
            } else if (page === 'search') {
                mainContent.innerHTML = renderSearchPage();
                initSearchEvents();
            }
        }

        // ---------- 计划页 ----------
        function renderPlanPage() {
            return `
                <div class="main-layout">
                    <div class="date-sidebar" id="dateSidebar">
                        ${weekDates.map((d, index) => `
                            <div class="date-item ${d.dateStr === selectedDate ? 'active' : ''}" data-date="${d.dateStr}">
                                ${weekDays[index]}<br>${d.dateStr}
                                ${d.isToday ? '<span class="date-tag">今</span>' : ''}
                            </div>
                        `).join('')}
                        
                        <div style="display: flex; justify-content: center; gap: 20px; padding: 6px 0; margin-top: 8px;">
                            <span style="font-size: 18px; cursor: pointer;" id="prevWeekBtn">◀</span>
                            <span style="font-size: 18px; cursor: pointer;" id="nextWeekBtn">▶</span>
                        </div>
                    </div>
                    <div class="plan-content" id="planContent">
                        ${renderPlanContent()}
                    </div>
                </div>
            `;
        }

        function renderPlanContent() {
            const dayData = planData[selectedDate] || { breakfast: {}, lunch: {}, dinner: {} };
            let html = `<div class="selected-date-title">${selectedDate}</div>`;
            
            if (dayData.breakfast) html += renderMealSection('早餐', dayData.breakfast);
            if (dayData.lunch) html += renderMealSection('午餐', dayData.lunch);
            if (dayData.dinner) html += renderMealSection('晚餐', dayData.dinner);
            
            return html;
        }

        function renderMealSection(title, mealData) {
            const categories = ['主食', '蔬菜', '肉鱼', '蛋', '油脂', '水果'];
            let sectionHtml = `
                <div class="meal-section">
                    <div class="meal-header">
                        <span class="arrow">▼</span> ${title}
                        <span style="margin-left: auto; font-size: 14px; cursor: pointer; color: #999;" 
                              class="delete-meal" data-meal="${title}">✕</span>
                    </div>
                    <div class="meal-content">
            `;

            categories.forEach(cat => {
                const catRecipes = mealData[cat] || [];
                sectionHtml += `
                    <div class="category-row">
                        <div class="category-title">
                            <span>${cat}</span>
                            <span class="add-btn-small" data-meal="${title}" data-category="${cat}">➕</span>
                        </div>
                        <div class="card-grid" data-meal="${title}" data-category="${cat}">
                `;
                
                catRecipes.forEach(recipeName => {
                    const recipe = recipes.find(r => r.name === recipeName);
                    const count = recipe ? recipe.history.length : 0;
                    sectionHtml += renderRecipeCard(recipeName, count);
                });

                sectionHtml += `</div></div>`;
            });

            sectionHtml += `</div></div>`;
            return sectionHtml;
        }

        function renderRecipeCard(name, count) {
            return `
                <div class="recipe-card" data-name="${name}">
                    <div class="card-image"></div>
                    <div class="recipe-name">${name}</div>
                    ${count > 0 ? `<div class="red-dot">${count}</div>` : ''}
                </div>
            `;
        }

        function initPlanEvents() {
            // 日期点击
            document.querySelectorAll('.date-item').forEach(el => {
                el.addEventListener('click', () => {
                    document.querySelectorAll('.date-item').forEach(d => d.classList.remove('active'));
                    el.classList.add('active');
                    selectedDate = el.dataset.date;
                    document.getElementById('planContent').innerHTML = renderPlanContent();
                    initPlanEvents();
                });
            });
            
            // 折叠
            document.querySelectorAll('.meal-header').forEach(header => {
                header.addEventListener('click', () => {
                    header.classList.toggle('collapsed');
                    header.nextElementSibling.classList.toggle('collapsed');
                });
            });
            
            // 加号点击
            document.querySelectorAll('.add-btn-small').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectedMeal = btn.dataset.meal;
                    selectedCategory = btn.dataset.category;
                    showSelectModal(selectedCategory);
                });
            });
            
            // 删除整餐
            document.querySelectorAll('.delete-meal').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    const meal = btn.dataset.meal;
                    const mealMap = { '早餐': 'breakfast', '午餐': 'lunch', '晚餐': 'dinner' };
                    const mealKey = mealMap[meal];
                    
                    if (planData[selectedDate] && planData[selectedDate][mealKey]) {
                        delete planData[selectedDate][mealKey];
                        document.getElementById('planContent').innerHTML = renderPlanContent();
                        saveData();
                        setTimeout(() => initPlanEvents(), 0);
                    }
                });
            });
            
            // 菜谱卡片点击 - 显示预览
            document.querySelectorAll('.recipe-card').forEach(card => {
                card.addEventListener('click', () => {
                    const recipe = recipes.find(r => r.name === card.dataset.name);
                    if (recipe) showPreviewModal(recipe);
                });
            });
            
            // 上一周箭头
            document.getElementById('prevWeekBtn')?.addEventListener('click', (e) => {
                e.stopPropagation();
                const oldPlanData = { ...planData };
                
                weekDates.forEach(d => {
                    d.fullDate.setDate(d.fullDate.getDate() - 7);
                    const month = d.fullDate.getMonth() + 1;
                    const day = d.fullDate.getDate();
                    const newDateStr = `${month.toString().padStart(2, '0')}/${day.toString().padStart(2, '0')}`;
                    
                    if (oldPlanData[newDateStr]) {
                        planData[newDateStr] = oldPlanData[newDateStr];
                    } else {
                        planData[newDateStr] = { 
                            breakfast: { '主食': [], '蔬菜': [], '肉鱼': [], '蛋': [], '油脂': [], '水果': [] },
                            lunch: { '主食': [], '蔬菜': [], '肉鱼': [], '蛋': [], '油脂': [], '水果': [] },
                            dinner: { '主食': [], '蔬菜': [], '肉鱼': [], '蛋': [], '油脂': [], '水果': [] }
                        };
                    }
                    
                    d.dateStr = newDateStr;
                    d.isToday = d.fullDate.toDateString() === today.toDateString();
                });
                
                selectedDate = weekDates.find(d => d.isToday)?.dateStr || weekDates[0].dateStr;
                saveData();
                showPage('plan');
            });

            // 下一周箭头
            document.getElementById('nextWeekBtn')?.addEventListener('click', (e) => {
                e.stopPropagation();
                const oldPlanData = { ...planData };
                
                weekDates.forEach(d => {
                    d.fullDate.setDate(d.fullDate.getDate() + 7);
                    const month = d.fullDate.getMonth() + 1;
                    const day = d.fullDate.getDate();
                    const newDateStr = `${month.toString().padStart(2, '0')}/${day.toString().padStart(2, '0')}`;
                    
                    if (oldPlanData[newDateStr]) {
                        planData[newDateStr] = oldPlanData[newDateStr];
                    } else {
                        planData[newDateStr] = { 
                            breakfast: { '主食': [], '蔬菜': [], '肉鱼': [], '蛋': [], '油脂': [], '水果': [] },
                            lunch: { '主食': [], '蔬菜': [], '肉鱼': [], '蛋': [], '油脂': [], '水果': [] },
                            dinner: { '主食': [], '蔬菜': [], '肉鱼': [], '蛋': [], '油脂': [], '水果': [] }
                        };
                    }
                    
                    d.dateStr = newDateStr;
                    d.isToday = d.fullDate.toDateString() === today.toDateString();
                });
                
                selectedDate = weekDates.find(d => d.isToday)?.dateStr || weekDates[0].dateStr;
                saveData();
                showPage('plan');
            });
        }

        // ---------- 预览弹窗 ----------
        function showPreviewModal(recipe) {
            currentPreviewRecipe = recipe;
            document.getElementById('previewName').textContent = recipe.name;
            document.getElementById('previewTotal').textContent = recipe.history.length + '次';
            
            const monthCount = recipe.history.filter(h => h.includes('03/')).length;
            document.getElementById('previewMonth').textContent = monthCount + '次';
            document.getElementById('previewLast').textContent = recipe.history[0] || '暂无';
            
            const historyHtml = recipe.history.slice(0, 10).map(h => 
                `<div class="history-item">• ${h}</div>`
            ).join('') || '<div class="history-item">暂无记录</div>';
            
            document.getElementById('previewHistory').innerHTML = historyHtml;
            document.getElementById('previewModal').classList.add('active');
        }

        // ---------- 选择菜谱弹窗 ----------
        function showSelectModal(category) {
            const modal = document.getElementById('selectModal');
            document.getElementById('selectTitle').textContent = `选择${category}`;
            
            const filteredRecipes = recipes.filter(r => r.category === category);
            const grid = document.getElementById('selectGrid');
            
            grid.innerHTML = filteredRecipes.map(recipe => 
                renderRecipeCard(recipe.name, recipe.history.length)
            ).join('');
            
            modal.classList.add('active');
            
            grid.querySelectorAll('.recipe-card').forEach(card => {
                card.addEventListener('click', () => {
                    const recipeName = card.dataset.name;
                    addToPlan(recipeName);
                    modal.classList.remove('active');
                });
            });
            
            document.getElementById('closeSelectBtn').addEventListener('click', () => {
                modal.classList.remove('active');
            });
        }

        function addToPlan(recipeName) {
            if (!selectedMeal || !selectedCategory) return;
            
            const mealMap = { '早餐': 'breakfast', '午餐': 'lunch', '晚餐': 'dinner' };
            const mealKey = mealMap[selectedMeal];
            
            if (!planData[selectedDate][mealKey][selectedCategory]) {
                planData[selectedDate][mealKey][selectedCategory] = [];
            }
            
            if (!planData[selectedDate][mealKey][selectedCategory].includes(recipeName)) {
                planData[selectedDate][mealKey][selectedCategory].push(recipeName);
            }
            
            const recipe = recipes.find(r => r.name === recipeName);
            if (recipe) {
                const todayStr = `${selectedDate}${selectedMeal}`;
                if (!recipe.history.includes(todayStr)) {
                    recipe.history.unshift(todayStr);
                }
            }
            
            document.getElementById('planContent').innerHTML = renderPlanContent();
            saveData();
            initPlanEvents();
        }

        // ---------- 菜谱库页 ----------
        function renderRecipePage() {
            return `
                <div class="recipe-page">
                    <div class="recipe-header">
                        <h2>📖 菜谱库</h2>
                        <input type="text" class="search-box" id="recipeSearch" placeholder="搜索...">
                    </div>
                    <div class="category-filter" id="categoryFilter">
                        <span class="filter-tag active" data-category="all">全部</span>
                        <span class="filter-tag" data-category="主食">🍚 主食</span>
                        <span class="filter-tag" data-category="蔬菜">🥬 蔬菜</span>
                        <span class="filter-tag" data-category="肉鱼">🐟 肉鱼</span>
                        <span class="filter-tag" data-category="蛋">🥚 蛋</span>
                        <span class="filter-tag" data-category="油脂">🥜 油脂</span>
                        <span class="filter-tag" data-category="水果">🍎 水果</span>
                    </div>
                    <div class="library-grid" id="libraryGrid"></div>
                </div>
            `;
        }

        function initRecipeEvents() {
            renderLibrary();
            
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                    tag.classList.add('active');
                    renderLibrary(tag.dataset.category, document.getElementById('recipeSearch').value);
                });
            });
            
            document.getElementById('recipeSearch').addEventListener('input', (e) => {
                const activeCat = document.querySelector('.filter-tag.active').dataset.category;
                renderLibrary(activeCat, e.target.value);
            });
        }

        function renderLibrary(category = 'all', search = '') {
            const grid = document.getElementById('libraryGrid');
            let filtered = recipes;

            if (category !== 'all') {
                filtered = filtered.filter(r => r.category === category);
            }
            if (search) {
                filtered = filtered.filter(r => r.name.includes(search));
            }

            grid.innerHTML = filtered.map(recipe => 
                renderRecipeCard(recipe.name, recipe.history.length)
            ).join('');

            document.querySelectorAll('#libraryGrid .recipe-card').forEach(card => {
                card.addEventListener('click', () => {
                    const recipe = recipes.find(r => r.name === card.dataset.name);
                    if (recipe) showPreviewModal(recipe);
                });
            });
        }

        // ---------- 搜索页 ----------
        function renderSearchPage() {
            return `
                <div class="search-page">
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索菜谱或食材..." autocomplete="off">
                    
                    <div class="recent-title">最近搜索</div>
                    <div class="recent-tags" id="recentTags">
                        ${getRecentTags()}
                    </div>

                    <div class="search-results" id="searchResults">
                        <div class="search-results-title">搜索结果</div>
                        <div class="library-grid" id="searchResultsGrid"></div>
                    </div>
                </div>
            `;
        }

        function getRecentTags() {
            const recent = JSON.parse(localStorage.getItem('recent_searches') || '[]');
            if (recent.length === 0) {
                return '<span class="recent-tag">暂无搜索记录</span>';
            }
            return recent.map(tag => `<span class="recent-tag" data-search="${tag}">${tag}</span>`).join('');
        }

        function addRecentSearch(search) {
            if (!search.trim()) return;
            let recent = JSON.parse(localStorage.getItem('recent_searches') || '[]');
            recent = [search, ...recent.filter(s => s !== search)].slice(0, 10);
            localStorage.setItem('recent_searches', JSON.stringify(recent));
        }

        function performSearch(query) {
            if (!query.trim()) {
                document.getElementById('searchResultsGrid').innerHTML = '';
                return;
            }
            
            addRecentSearch(query);
            
            const results = recipes.filter(r => 
                r.name.includes(query) || 
                r.category.includes(query) ||
                r.history.some(h => h.includes(query))
            );
            
            const grid = document.getElementById('searchResultsGrid');
            if (results.length === 0) {
                grid.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">未找到相关菜谱</div>';
            } else {
                grid.innerHTML = results.map(recipe => 
                    renderRecipeCard(recipe.name, recipe.history.length)
                ).join('');
                
                grid.querySelectorAll('.recipe-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const recipe = recipes.find(r => r.name === card.dataset.name);
                        if (recipe) showPreviewModal(recipe);
                    });
                });
            }
            
            // 刷新最近搜索
            const recentTags = document.getElementById('recentTags');
            if (recentTags) {
                recentTags.innerHTML = getRecentTags();
                initRecentTagEvents();
            }
        }

        function initRecentTagEvents() {
            document.querySelectorAll('.recent-tag[data-search]').forEach(tag => {
                tag.addEventListener('click', () => {
                    const search = tag.dataset.search;
                    document.getElementById('searchInput').value = search;
                    performSearch(search);
                });
            });
        }

        function initSearchEvents() {
            const searchInput = document.getElementById('searchInput');
            let timeout;
            
            searchInput.addEventListener('input', (e) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    performSearch(e.target.value);
                }, 300);
            });
            
            initRecentTagEvents();
        }

        // ---------- 编辑功能 ----------
        function showEditModal(recipe) {
            document.getElementById('editId').value = recipe.id;
            document.getElementById('editName').value = recipe.name;
            document.getElementById('editCategory').value = recipe.category;
            document.getElementById('editImage').value = recipe.image || '';
            
            renderEditHistory(recipe.history);
            document.getElementById('editModal').classList.add('active');
        }

        function renderEditHistory(history) {
            const container = document.getElementById('editHistoryList');
            container.innerHTML = '';
            
            history.forEach((item, index) => {
                const div = document.createElement('div');
                div.style.cssText = 'display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px dashed #eee;';
                div.innerHTML = `
                    <span style="font-size: 13px;">${item}</span>
                    <span style="color: #999; cursor: pointer; font-size: 16px;" class="remove-history" data-index="${index}">✕</span>
                `;
                container.appendChild(div);
            });
            
            document.querySelectorAll('.remove-history').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = btn.dataset.index;
                    const recipeId = document.getElementById('editId').value;
                    const recipe = recipes.find(r => r.id == recipeId);
                    if (recipe) {
                        recipe.history.splice(index, 1);
                        renderEditHistory(recipe.history);
                    }
                });
            });
        }

        // ---------- 初始化 ----------
        function init() {
            // 导航点击
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => showPage(item.dataset.page));
            });
            
            // 默认显示计划页
            showPage('plan');
            
            // 预览弹窗关闭
            document.getElementById('previewCloseBtn').addEventListener('click', () => {
                document.getElementById('previewModal').classList.remove('active');
            });
            
            // 预览弹窗编辑按钮
            document.getElementById('previewEditBtn').addEventListener('click', () => {
                if (currentPreviewRecipe) {
                    document.getElementById('previewModal').classList.remove('active');
                    showEditModal(currentPreviewRecipe);
                }
            });
            
            // 编辑弹窗关闭
            document.getElementById('closeEditBtn').addEventListener('click', () => {
                document.getElementById('editModal').classList.remove('active');
            });
            
            // 保存编辑
            document.getElementById('saveEditBtn').addEventListener('click', () => {
                const id = document.getElementById('editId').value;
                const recipe = recipes.find(r => r.id == id);
                if (recipe) {
                    recipe.name = document.getElementById('editName').value;
                    recipe.category = document.getElementById('editCategory').value;
                    recipe.image = document.getElementById('editImage').value;
                    
                    if (document.querySelector('.nav-item.active').dataset.page === 'recipe') {
                        renderLibrary();
                    }
                    
                    saveData();
                    document.getElementById('editModal').classList.remove('active');
                }
            });
            
            // 删除菜谱
            document.getElementById('deleteBtn').addEventListener('click', () => {
                if (confirm('确定删除这个菜谱吗？')) {
                    const id = document.getElementById('editId').value;
                    const index = recipes.findIndex(r => r.id == id);
                    if (index !== -1) {
                        recipes.splice(index, 1);
                        
                        if (document.querySelector('.nav-item.active').dataset.page === 'recipe') {
                            renderLibrary();
                        }
                        
                        saveData();
                        document.getElementById('editModal').classList.remove('active');
                    }
                }
            });
            
            // 添加历史记录
            document.getElementById('addHistoryBtn').addEventListener('click', () => {
                const newRecord = prompt('输入新记录 (格式: 03/11早餐)');
                if (newRecord) {
                    const id = document.getElementById('editId').value;
                    const recipe = recipes.find(r => r.id == id);
                    if (recipe) {
                        recipe.history.unshift(newRecord);
                        renderEditHistory(recipe.history);
                        saveData();
                    }
                }
            });
            
            // 新建菜谱
            document.getElementById('newRecipeBtn').addEventListener('click', () => {
                alert('新建菜谱功能开发中');
            });
        }

        init();
    </script>
</body>
</html>
