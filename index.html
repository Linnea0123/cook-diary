            display: flex;
            height: 100%;
            overflow: hidden;
        }

        /* 左侧栏 - flex列布局 */
        .date-sidebar {
            width: 88px;
            background: #f8fbfe;
            border-right: 1px solid var(--border);

            display: flex;
            flex-direction: column;

        /* 日期列表区域 - 可滚动，占据剩余空间 */
        .date-items {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .timeRangeBtn {
    background: var(--primary-light);

}


        .date-item {

        .date-item.active {

        .date-tag { font-size: 9px; background: var(--primary-light); display: inline-block; padding: 2px 6px; border-radius: 12px; margin-top: 4px; color: var(--primary); }

   

/* 左侧栏 - flex列布局 */
.date-sidebar {

/* 箭头区域 - 紧贴在星期日下方，紧凑 */

}

    transform: scale(0.92);
}

/* 设置按钮区域 - 紧贴箭头下方 */

.count-badge {

        .add-btn-slim { font-size: 18px; cursor: pointer; color: #7f8c8d; background: none; border: none; width: 28px; height: 28px; }

}

.category-filter::-webkit-scrollbar {

        /* 搜索页 */
        .search-input { width: 100%; padding: 12px 18px; border: 1px solid var(--border); border-radius: 40px; font-size: 15px; margin-bottom: 20px; background: #f5f7fa; }

        .modal-title { font-size: 18px; font-weight: 600; color: var(--primary); margin-bottom: 20px; text-align: center; }

.modal-btn-primary,

    function getWeekDates() {
        const today = new Date();
        const start = new Date(today);
        start.setDate(today.getDate() - today.getDay() + 1);
        let dates = [];
        const weekNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
        for (let i = 0; i < 7; i++) {
            const d = new Date(start);
            d.setDate(start.getDate() + i);
            const m = d.getMonth() + 1, day = d.getDate();
            dates.push({ dateStr: `${m.toString().padStart(2,'0')}/${day.toString().padStart(2,'0')}`, week: weekNames[i], fullDate: d, isToday: d.toDateString() === today.toDateString() });
        }
        return dates;
    }
    let weekDates = getWeekDates();
    let currentTimeRange = 'month'; // 'month', 'quarter', 'year', 'all'
    function initEmptyPlan() { let empty = {}; weekDates.forEach(d => { empty[d.dateStr] = {}; defaultMeals.forEach(m => { empty[d.dateStr][m] = { '主食':[], '蔬菜':[], '肉鱼':[], '蛋':[], '油脂':[], '水果':[] }; }); }); return empty; }
    


// 加载类别
function loadCategories() {
    const saved = localStorage.getItem('custom_categories');
    if (saved) {
        try {
            customCategories = JSON.parse(saved);
        } catch(e) {}
    }
    // 确保默认分类存在
    const defaultCats = ['主食', '蔬菜', '肉鱼', '蛋', '油脂', '水果'];
    for (let cat of defaultCats) {
        if (!customCategories.includes(cat)) {
            customCategories.push(cat);
        }
    }
}

    function loadData() {
        loadCategories(); // 添加这一行
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            const data = JSON.parse(saved);
            // 兼容旧数据格式
            if (data.recipes && !data.recipes.mom) {
                // 旧格式：recipes 是数组，需要转换
                const oldRecipes = data.recipes;
                recipes = {
                    mom: [...oldRecipes],
                    baby: [...oldRecipes]
                };
            } else {
                recipes = data.recipes || { mom: [...defaultRecipes], baby: [...defaultRecipes] };
            }
            userData = data.userData || { mom: { planData: initEmptyPlan(), history: {}, mealOrder: {} }, baby: { planData: initEmptyPlan(), history: {}, mealOrder: {} } };
        } catch(e) {
            recipes = { mom: [...defaultRecipes], baby: [...defaultRecipes] };
            userData = { mom: { planData: initEmptyPlan(), history: {}, mealOrder: {} }, baby: { planData: initEmptyPlan(), history: {}, mealOrder: {} } };
        }
    } else {
        recipes = { mom: [...defaultRecipes], baby: [...defaultRecipes] };
        userData = { mom: { planData: initEmptyPlan(), history: {}, mealOrder: {} }, baby: { planData: initEmptyPlan(), history: {}, mealOrder: {} } };
    }
    
    // 确保每个用户的 recipes 都存在
    if (!recipes.mom) recipes.mom = [...defaultRecipes];
    if (!recipes.baby) recipes.baby = [...defaultRecipes];
    
    ['mom','baby'].forEach(u => {
        if (!userData[u].planData) userData[u].planData = initEmptyPlan();
        if (!userData[u].history) userData[u].history = {};
        if (!userData[u].mealOrder) userData[u].mealOrder = {};
        // 为每个用户的菜谱初始化历史记录
        (recipes[u] || []).forEach(r => { 
            if (!userData[u].history[r.id]) userData[u].history[r.id] = []; 
        });
        weekDates.forEach(d => {
            if (!userData[u].planData[d.dateStr]) {
                userData[u].planData[d.dateStr] = {};
                defaultMeals.forEach(m => { userData[u].planData[d.dateStr][m] = { '主食':[], '蔬菜':[], '肉鱼':[], '蛋':[], '油脂':[], '水果':[] }; });
            }
        });
    });
}
    function currentRecipes() {
    return recipes[currentUser] || [];

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ recipes, userData })); }
    
    function currentPlan() { return userData[currentUser].planData; }
    function currentMealOrder() { return userData[currentUser].mealOrder; }
    
    function currentHistory(rid, timeRange = null) {
    const range = timeRange || currentTimeRange;
    const allHistory = userData[currentUser].history[rid] || [];
    if (range === 'all') return allHistory;
    
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth(); // 0-11
    
    return allHistory.filter(record => {
        // 记录格式如 "03/23早餐" 或 "03/23午餐"
        const datePart = record.substring(0, 5); // 取 "03/23"
        const [month, day] = datePart.split('/');
        const recordDate = new Date(currentYear, parseInt(month) - 1, parseInt(day));
        
        if (range === 'month') {
            // 同一个月
            return recordDate.getMonth() === currentMonth && recordDate.getFullYear() === currentYear;
        } else if (range === 'quarter') {
            // 本季度
            const currentQuarter = Math.floor(currentMonth / 3);
            const recordQuarter = Math.floor(recordDate.getMonth() / 3);
            return recordQuarter === currentQuarter && recordDate.getFullYear() === currentYear;
        } else if (range === 'year') {
            // 本年
            return recordDate.getFullYear() === currentYear;
        }
        return true;
    });
}
  
    function addHistory(rid, record) { 
        if (!userData[currentUser].history[rid]) userData[currentUser].history[rid] = [];
        userData[currentUser].history[rid].unshift(record);
        if (userData[currentUser].history[rid].length > 15) userData[currentUser].history[rid].pop();
        saveData();
    }
    
    let selectedDate = weekDates.find(d => d.isToday)?.dateStr || weekDates[0].dateStr;
    let selectedMeal = '', selectedCategory = '';
    let currentPreview = null;
let currentPreviewSource = null; // 添加这一行
    
    function getMealsForDate(dateStr) {
        const order = currentMealOrder()[dateStr];
        if (order && order.length) return order;
        return [...defaultMeals];
    }

        for (let meal of meals) {

            let inner = '';

                    const count = recipe ? currentHistory(recipe.id).length : 0;

                }).join('') : '<span style="font-size:12px;color:#aaa;"></span>';
                inner += `<div class="category-row"><span class="category-title" data-cat="${cat}">${cat}</span><div class="recipe-tags">${tagsHtml}</div><button class="add-btn-slim" data-meal="${meal}" data-category="${cat}">+</button></div>`;
            });
            html += `<div class="meal-section"><div class="meal-header"><span class="arrow">▼</span> ${meal}<button class="delete-meal" data-meal="${meal}">✕</button></div><div class="meal-content">${inner}</div></div>`;
        }
        return html;
    }

    function addNewMeal() {
        const newMeal = document.getElementById('newMealName').value.trim();
        if (!newMeal) return;
        const meals = getMealsForDate(selectedDate);
        if (meals.includes(newMeal)) { alert('该餐次已存在'); return; }
        meals.push(newMeal);
        userData[currentUser].mealOrder[selectedDate] = meals;
        if (!currentPlan()[selectedDate][newMeal]) {
            currentPlan()[selectedDate][newMeal] = { '主食':[], '蔬菜':[], '肉鱼':[], '蛋':[], '油脂':[], '水果':[] };
        }
        saveData();

    function attachPlanEvents() {
    document.querySelectorAll('.recipe-tag').forEach(tag => {
        tag.addEventListener('click', () => { const recipe = currentRecipes().find(r => r.name === tag.dataset.name); if(recipe) showPreview(recipe, 'plan'); });
    });
        document.querySelectorAll('.add-btn-slim').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); selectedMeal = btn.dataset.meal; selectedCategory = btn.dataset.category; showSelectModal(selectedCategory); });
        });
        document.querySelectorAll('.meal-header').forEach(header => {
            header.addEventListener('click', (e) => { if(e.target.classList.contains('delete-meal')) return; header.classList.toggle('collapsed'); header.nextElementSibling.classList.toggle('collapsed'); });
        });
        document.querySelectorAll('.delete-meal').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); const meal = btn.dataset.meal; const meals = getMealsForDate(selectedDate); const idx = meals.indexOf(meal); if(idx !== -1) { meals.splice(idx,1); userData[currentUser].mealOrder[selectedDate] = meals; delete currentPlan()[selectedDate][meal]; saveData(); refreshPlan(); } });
        });
    }
    
    function shiftWeek(days) {
    weekDates.forEach(d => { 
        d.fullDate.setDate(d.fullDate.getDate() + days); 
        const m = d.fullDate.getMonth()+1, day = d.fullDate.getDate(); 
        d.dateStr = `${m.toString().padStart(2,'0')}/${day.toString().padStart(2,'0')}`; 
        d.isToday = d.fullDate.toDateString() === new Date().toDateString(); 
    });
    selectedDate = weekDates.find(d => d.isToday)?.dateStr || weekDates[0].dateStr;
    
    // 更新计划数据结构...
    ['mom','baby'].forEach(u => { 
        let np = {}; 
        weekDates.forEach(w => { 
            np[w.dateStr] = userData[u].planData[w.dateStr] || {}; 
            if(Object.keys(np[w.dateStr]).length === 0) { 
                np[w.dateStr] = {}; 
                defaultMeals.forEach(m => { 
                    np[w.dateStr][m] = { '主食':[], '蔬菜':[], '肉鱼':[], '蛋':[], '油脂':[], '水果':[] }; 
                }); 
            } 
        }); 
        userData[u].planData = np; 
    });
    saveData();
    
    const mainContent = document.getElementById('mainContent');
    if (document.querySelector('.nav-item.active').dataset.page === 'plan') { 
        mainContent.innerHTML = renderPlanPage(); 
        refreshPlan(); 
        
        // 【关键修改】切换周后，确保高亮正确
        setTimeout(() => {
            const newActiveItem = document.querySelector(`.date-item[data-date="${selectedDate}"]`);
            if (newActiveItem) {
                document.querySelectorAll('.date-item').forEach(item => {
                    item.classList.remove('active');
                });
                newActiveItem.classList.add('active');
            }
        }, 50);
    }
}
    
    function attachDateNav() {
    // 绑定日期点击事件
    document.querySelectorAll('.date-item').forEach(el => {
        el.addEventListener('click', () => { 
            selectedDate = el.dataset.date; 
            
            // 手动更新日期高亮
            document.querySelectorAll('.date-item').forEach(item => {
                item.classList.remove('active');
            });
            el.classList.add('active');
            
            refreshPlan(); 
        });
    });
    
    // 绑定周箭头事件（移到 forEach 外面）
    const weekNav = document.querySelector('.week-nav-container');
    if (weekNav) {
        weekNav.removeEventListener('click', window._arrowHandler);
        window._arrowHandler = (e) => {
            const target = e.target.closest('.week-arrow');
            if (!target) return;
            if (target.classList.contains('prev')) shiftWeek(-7);
            else if (target.classList.contains('next')) shiftWeek(7);
        };
        weekNav.addEventListener('click', window._arrowHandler);
    }
    
    // 绑定设置按钮事件（移到 forEach 外面）
    const sidebarBtn = document.getElementById('sidebarSettingsBtn');
    if (sidebarBtn) {
        sidebarBtn.removeEventListener('click', window._settingsHandler);
        window._settingsHandler = () => {
            document.getElementById('githubToken').value = localStorage.getItem('github_token') || '';
            document.getElementById('gistId').value = localStorage.getItem('gist_id') || '';
            document.getElementById('settingsModal').classList.add('active');
        };
        sidebarBtn.addEventListener('click', window._settingsHandler);
    }
}
    


   function addToPlan(recipeName) {
    if (!selectedMeal || !selectedCategory) return;
    const plan = currentPlan()[selectedDate];
    if (!plan[selectedMeal]) plan[selectedMeal] = { '主食':[], '蔬菜':[], '肉鱼':[], '蛋':[], '油脂':[], '水果':[] };
    if (!plan[selectedMeal][selectedCategory]) plan[selectedMeal][selectedCategory] = [];
    if (!plan[selectedMeal][selectedCategory].includes(recipeName)) {
        plan[selectedMeal][selectedCategory].push(recipeName);
        const recipe = currentRecipes().find(r => r.name === recipeName);  // ✅ 改为 currentRecipes()
        if (recipe) addHistory(recipe.id, `${selectedDate}${selectedMeal}`);
        saveData();
        refreshPlan();
    }
}

    const searchInput = document.getElementById('recipeSearch');
    if (searchInput) {
        searchInput.removeEventListener('input', searchInput._inputHandler);
        searchInput._inputHandler = (e) => {
            const activeCat = document.querySelector('.filter-tag.active');
            const category = activeCat ? activeCat.dataset.category : 'all';
            renderLibrary(category, e.target.value);
        };
        searchInput.addEventListener('input', searchInput._inputHandler);
    }
    
    // 初始化类别编辑器
    initCategoryEditor();
    
    // 初始化时间范围选择器
    initTimeRangeSelector();
}


function initTimeRangeSelector() {
    const timeRangeBtn = document.getElementById('timeRangeBtn');
    if (timeRangeBtn) {
        timeRangeBtn.onclick = () => {
            // 循环切换时间范围
            const ranges = ['month', 'quarter', 'year', 'all'];
            const currentIndex = ranges.indexOf(currentTimeRange);
            const nextIndex = (currentIndex + 1) % ranges.length;
            currentTimeRange = ranges[nextIndex];
            
            // 更新按钮文字
            timeRangeBtn.innerHTML = `📅 ${getTimeRangeText()}`;
            
            // 刷新菜谱库显示
            const activeCat = document.querySelector('.filter-tag.active');
            const category = activeCat ? activeCat.dataset.category : 'all';
            const searchValue = document.getElementById('recipeSearch') ? document.getElementById('recipeSearch').value : '';
            renderLibrary(category, searchValue);
        };
    }
}

// 初始化类别编辑器
function initCategoryEditor() {
    const editBtn = document.getElementById('editCategoryBtn');
    if (editBtn) {
        editBtn.onclick = () => {
            renderCategoryList();
            document.getElementById('categoryEditModal').classList.add('active');
        };
    }
    
    document.getElementById('addCategoryBtn').onclick = () => {
        const newName = document.getElementById('newCategoryName').value.trim();
        if (!newName) {
            alert('请输入类别名称');
            return;
        }
        if (customCategories.includes(newName)) {
            alert('类别已存在');
            return;
        }
        customCategories.push(newName);
        saveCategories();
        document.getElementById('newCategoryName').value = '';
        renderCategoryList();
        // 刷新菜谱库页面
        const activePage = document.querySelector('.nav-item.active').dataset.page;
        if (activePage === 'recipe') {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = renderRecipePage();
            initRecipe();
            initCategoryEditor();
        }
    };
    
    document.getElementById('closeCategoryEditBtn').onclick = () => {
        document.getElementById('categoryEditModal').classList.remove('active');
    };

}

function renderCategoryList() {
    const container = document.getElementById('categoryList');
    if (!container) return;
    
    container.innerHTML = customCategories.map(cat => `
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee;">
            <span style="font-size: 14px;">${cat}</span>
            <div style="display: flex; gap: 8px;">
                <button class="edit-cat-btn" data-cat="${cat}" style="background: none; border: none; font-size: 14px; cursor: pointer; color: #4a627a;">✏️</button>
                <button class="delete-cat-btn" data-cat="${cat}" style="background: none; border: none; font-size: 14px; cursor: pointer; color: #c62828;">🗑️</button>
            </div>
        </div>
    `).join('');
    
    // 编辑类别
    document.querySelectorAll('.edit-cat-btn').forEach(btn => {
        btn.onclick = () => {
            const oldName = btn.dataset.cat;
            const newName = prompt('请输入新类别名称', oldName);
            if (newName && newName.trim() && newName !== oldName) {
                if (customCategories.includes(newName)) {
                    alert('类别已存在');
                    return;
                }
                const index = customCategories.indexOf(oldName);
                if (index !== -1) {
                    customCategories[index] = newName;
                    saveCategories();
                    // 更新所有菜谱的类别
                    ['mom', 'baby'].forEach(u => {
                        (recipes[u] || []).forEach(recipe => {
                            if (recipe.category === oldName) {
                                recipe.category = newName;
                            }
                        });
                    });
                    saveData();
                    renderCategoryList();
                    // 刷新菜谱库
                    const activePage = document.querySelector('.nav-item.active').dataset.page;
                    if (activePage === 'recipe') {
                        const mainContent = document.getElementById('mainContent');
                        mainContent.innerHTML = renderRecipePage();
                        initRecipe();
                        initCategoryEditor();
                    }
                }
            }
        };
    });
    
    // 删除类别
    document.querySelectorAll('.delete-cat-btn').forEach(btn => {
        btn.onclick = () => {
            const catName = btn.dataset.cat;
            const defaultCats = ['主食', '蔬菜', '肉鱼', '蛋', '油脂', '水果'];
            if (defaultCats.includes(catName)) {
                alert('默认分类不能删除');
                return;
            }
            if (confirm(`确定删除类别「${catName}」吗？\n该类别下的菜谱将移至「其他」类别`)) {
                const index = customCategories.indexOf(catName);
                if (index !== -1) {
                    customCategories.splice(index, 1);
                    saveCategories();
                    // 将属于该类别的菜谱改为「其他」
                    ['mom', 'baby'].forEach(u => {
                        (recipes[u] || []).forEach(recipe => {
                            if (recipe.category === catName) {
                                recipe.category = '其他';
                            }
                        });
                    });
                    // 确保「其他」类别存在
                    if (!customCategories.includes('其他')) {
                        customCategories.push('其他');
                        saveCategories();
                    }
                    saveData();
                    renderCategoryList();
                    // 刷新菜谱库
                    const activePage = document.querySelector('.nav-item.active').dataset.page;
                    if (activePage === 'recipe') {
                        const mainContent = document.getElementById('mainContent');
                        mainContent.innerHTML = renderRecipePage();
                        initRecipe();
                        initCategoryEditor();
                    }
                }
            }
        };
    });
}


    function renderSearchPage() { return `<div class="search-page"><input type="text" class="search-input" id="searchInput" placeholder="搜索菜谱..."><div class="recent-title">最近搜索</div><div class="recent-tags" id="recentTags"></div><div class="search-results-title">结果</div><div class="library-text-grid" id="searchResGrid"></div></div>`; }
    
    function performSearch(q) { 
    if(!q.trim()) return; 
    let rec = JSON.parse(localStorage.getItem('recent_searches')||'[]'); 
    rec = [q, ...rec.filter(s=>s!==q)].slice(0,8); 
    localStorage.setItem('recent_searches',JSON.stringify(rec)); 
    const res = currentRecipes().filter(r=>r.name.includes(q)); 
    document.getElementById('searchResGrid').innerHTML = res.map(r => `<span class="recipe-text-card" data-id="${r.id}">${r.name}<span class="small-count">${currentHistory(r.id).length}</span></span>`).join(''); 
    document.querySelectorAll('#searchResGrid .recipe-text-card').forEach(c => { 
        c.addEventListener('click',()=>{ 
    const rec = currentRecipes().find(r=>r.id==parseInt(c.dataset.id)); 
    if(rec) showPreview(rec, 'recipe'); 
});
    }); 
    document.getElementById('recentTags').innerHTML = rec.map(t => `<span class="recent-tag" data-search="${t}">${t}</span>`).join(''); 
    document.querySelectorAll('.recent-tag[data-search]').forEach(t => { 
        t.addEventListener('click',()=>{ 
            document.getElementById('searchInput').value=t.dataset.search; 
            performSearch(t.dataset.search); 
        }); 
    }); 
}
    function initSearch() { let t; document.getElementById('searchInput').addEventListener('input', e=>{ clearTimeout(t); t=setTimeout(()=>performSearch(e.target.value),200); }); performSearch(''); }
    
    function showPage(page) {


    // 保存当前页面到 localStorage
    localStorage.setItem('last_page', page);


        const main = document.getElementById('mainContent');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.dataset.page === page));
        if (page === 'plan') { main.innerHTML = renderPlanPage(); refreshPlan(); }
        else if (page === 'recipe') { main.innerHTML = renderRecipePage(); initRecipe(); }
        else if (page === 'search') { main.innerHTML = renderSearchPage(); initSearch(); }
    }
    
    // Gist同步
    function saveSettings() { localStorage.setItem('github_token', document.getElementById('githubToken').value); localStorage.setItem('gist_id', document.getElementById('gistId').value); document.getElementById('syncStatus').innerText = '✅ 设置已保存'; setTimeout(()=>{ if(document.getElementById('syncStatus')) document.getElementById('syncStatus').innerText = '就绪'; },2000); }
    async function syncToGist() { const token = localStorage.getItem('github_token'); const gistId = localStorage.getItem('gist_id'); if(!token || !gistId){ document.getElementById('syncStatus').innerText = '❌ 请先保存Token和Gist ID'; return; } try { const data = { recipes, userData }; const res = await fetch(`https://api.github.com/gists/${gistId}`, { method: 'PATCH', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ files: { 'cook_diary.json': { content: JSON.stringify(data) } } }) }); if(res.ok) document.getElementById('syncStatus').innerText = '✅ 同步成功！'; else document.getElementById('syncStatus').innerText = '❌ 同步失败'; } catch(e) { document.getElementById('syncStatus').innerText = '❌ 网络错误'; } }
    async function restoreFromGist() { const token = localStorage.getItem('github_token'); const gistId = localStorage.getItem('gist_id'); if(!token || !gistId){ document.getElementById('syncStatus').innerText = '❌ 请先保存Token和Gist ID'; return; } try { const res = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { 'Authorization': `token ${token}` } }); if(res.ok){ const data = await res.json(); const content = data.files['cook_diary.json']?.content; if(content){ const parsed = JSON.parse(content); recipes = parsed.recipes; userData = parsed.userData; saveData(); document.getElementById('syncStatus').innerText = '✅ 恢复成功！'; location.reload(); } else throw new Error(); } else document.getElementById('syncStatus').innerText = '❌ 恢复失败'; } catch(e) { document.getElementById('syncStatus').innerText = '❌ 恢复失败'; } }
    
    loadData();
    applyTheme();
    document.getElementById('switchUserBtn').addEventListener('click', switchUser);
    document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', () => showPage(item.dataset.page)));
    // 从 localStorage 读取上次所在的页面，如果没有则默认为 plan
const lastPage = localStorage.getItem('last_page') || 'plan';
showPage(lastPage);
    
    document.getElementById('saveSettingsBtn').addEventListener('click', saveSettings);
    document.getElementById('syncToGistBtn').addEventListener('click', syncToGist);
    document.getElementById('restoreFromGistBtn').addEventListener('click', restoreFromGist);
    document.getElementById('closeSettingsBtn').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('active'));
    document.getElementById('confirmAddMealBtn').addEventListener('click', addNewMeal);
    document.getElementById('cancelAddMealBtn').addEventListener('click', () => document.getElementById('addMealModal').classList.remove('active'));
    document.getElementById('previewCloseBtn').onclick = () => document.getElementById('previewModal').classList.remove('active');
    
// 初始化图片上传功能
function initImageUpload() {
    const imageUpload = document.getElementById('editImageUpload');
    if (imageUpload) {
        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const preview = document.getElementById('editImagePreview');
                    preview.innerHTML = `<img src="${event.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                    // 保存图片为base64格式
                    if (!document.getElementById('editImageUrl')) {
                        const hiddenInput = document.createElement('input');
                        hiddenInput.type = 'hidden';
                        hiddenInput.id = 'editImageUrl';
                        document.querySelector('#editModal .modal-content').appendChild(hiddenInput);
                    }
                    document.getElementById('editImageUrl').value = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    }
}

// 预览弹窗 - 编辑按钮


// 预览弹窗 - 编辑按钮
document.getElementById('previewEditBtn').onclick = () => {
    if(currentPreview){
        document.getElementById('previewModal').classList.remove('active');
        document.getElementById('editId').value = currentPreview.id;
        document.getElementById('editName').value = currentPreview.name;
        document.getElementById('editCategory').value = currentPreview.category;
        
        // 显示已有图片
        const previewDiv = document.getElementById('editImagePreview');

            previewDiv.innerHTML = `<img src="${currentPreview.image}" style="width:100%; height:100%; object-fit:cover;">`;
        } else {
            previewDiv.innerHTML = '<span style="color: #999;">📷 暂无图片</span>';
        }
        
        // 确保隐藏input存在
        if (!document.getElementById('editImageUrl')) {
            const hiddenInput = document.createElement('input');
            hiddenInput.type = 'hidden';
            hiddenInput.id = 'editImageUrl';
            document.querySelector('#editModal .modal-content').appendChild(hiddenInput);
        }
        document.getElementById('editImageUrl').value = currentPreview.image || '';
        
        document.querySelector('#editModal h3').innerText = '编辑菜谱';
        document.getElementById('editModal').classList.add('active');
    }
};

// 预览弹窗 - 从当前计划中删除菜谱（移到这里）


// 预览弹窗 - 从当前计划中删除菜谱
document.getElementById('previewRemoveFromPlanBtn').onclick = () => {
    if (currentPreviewSource !== 'plan') return;
    if (!currentPreview) {
        alert('请先选择一个菜谱');
        return;
    }
    
    const recipeName = currentPreview.name;
    const plan = currentPlan()[selectedDate];
    const recipeId = currentPreview.id;
    
    if (!plan) {
        alert('计划数据不存在');
        return;
    }
    
    let removed = false;
    let removedFrom = [];
    
    // 遍历当天所有餐次
    for (let meal in plan) {
        if (plan[meal] && typeof plan[meal] === 'object') {
            for (let cat in plan[meal]) {
                const list = plan[meal][cat];
                if (Array.isArray(list)) {
                    const index = list.indexOf(recipeName);
                    if (index !== -1) {
                        list.splice(index, 1);
                        removed = true;
                        removedFrom.push(`${meal}·${cat}`);
                        
                        // 删除对应的历史记录（只删除当天的）
                        const historyKey = `${selectedDate}${meal}`;
                        const historyList = userData[currentUser].history[recipeId];
                        if (historyList) {
                            const historyIndex = historyList.indexOf(historyKey);
                            if (historyIndex !== -1) {
                                historyList.splice(historyIndex, 1);
                            }
                        }
                    }
                }
            }
        }
    }
    
    if (removed) {
        saveData();
        const activePage = document.querySelector('.nav-item.active')?.dataset.page;
        if (activePage === 'plan') {
            refreshPlan();
        }
        // 如果当前在菜谱库页面，刷新计数显示
        if (activePage === 'recipe') {
            const activeCat = document.querySelector('.filter-tag.active');
            const category = activeCat ? activeCat.dataset.category : 'all';
            const searchValue = document.getElementById('recipeSearch') ? document.getElementById('recipeSearch').value : '';
            renderLibrary(category, searchValue);
        }
        alert(`已从 ${selectedDate} 的计划中删除「${recipeName}」`);
    } else {
        alert(`「${recipeName}」不在 ${selectedDate} 的计划中`);
    }
    
    document.getElementById('previewModal').classList.remove('active');
};

// 预览弹窗 - 关闭按钮
document.getElementById('previewCloseBtn').onclick = () => {
    document.getElementById('previewModal').classList.remove('active');
};

document.getElementById('saveEditBtn').onclick = () => {
    const editId = document.getElementById('editId').value;
    const newName = document.getElementById('editName').value.trim();
    const newCategory = document.getElementById('editCategory').value;
    const newImageUrl = document.getElementById('editImageUrl') ? document.getElementById('editImageUrl').value : '';
    
    if (!newName) {
        alert('请输入菜谱名称');
        return;
    }
    
    const currentRecipesList = currentRecipes();
    
    if (editId) {
        // 编辑模式：更新当前用户的菜谱
        const recipe = currentRecipesList.find(r => r.id == parseInt(editId));
        if (recipe) {
            recipe.name = newName;
            recipe.category = newCategory;
            recipe.image = newImageUrl;
        }
    } else {
        // 新增模式：创建新菜谱（只添加到当前用户）
        const newId = Math.max(...currentRecipesList.map(r => r.id), 0) + 1;
        currentRecipesList.push({
            id: newId,
            name: newName,
            category: newCategory,
            image: newImageUrl
        });
        // 为新菜谱初始化历史记录
        if (!userData[currentUser].history[newId]) {
            userData[currentUser].history[newId] = [];
        }
    }
    
    saveData();
    document.getElementById('editModal').classList.remove('active');
    
    // 刷新当前页面
    const activePage = document.querySelector('.nav-item.active').dataset.page;
    if (activePage === 'recipe') {
        initRecipe();
    }
};

document.getElementById('deleteBtn').onclick = () => {
    const editId = document.getElementById('editId').value;
    if (!editId) {
        alert('请先保存菜谱后再删除');
        return;
    }
    if(confirm('删除菜谱？')){
        const idx = currentRecipes().findIndex(r => r.id == parseInt(editId));
        if(idx !== -1) currentRecipes().splice(idx, 1);
        saveData();
        document.getElementById('editModal').classList.remove('active');
        const activePage = document.querySelector('.nav-item.active').dataset.page;
        if(activePage === 'recipe') initRecipe();
        currentPreview = null;
    }
};

// 关闭编辑弹窗
document.getElementById('closeEditBtn').onclick = () => document.getElementById('editModal').classList.remove('active');

// 初始化图片上传
initImageUpload();

</script>
